appId: com.bymav.vitaai
tags:
  - fast
  - interactions
---
# FAST INTERACTIONS — Test actual user flows without relaunching
# Covers: flashcard flip, simulado config, qbank filters, scroll, double tap, rapid nav

- launchApp:
    clearState: false
    stopApp: false

- extendedWaitUntil:
    visible: ".*(?:Simulados|Acordar|Continuar|Google|Email).*"
    timeout: 25000

- tapOn:
    text: "Acordar Vita"
    optional: true
- tapOn:
    text: "Continuar"
    optional: true
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd

# ── Flashcard flip ──
- tapOn:
    text: "Flashcards"
    optional: true
- waitForAnimationToEnd
- tapOn:
    index: 0
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Revelar"
    optional: true
- tapOn:
    text: "Virar"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "fast-int-01-flashcard-flip"
- tapOn:
    text: "Fácil"
    optional: true
- tapOn:
    text: "Bom"
    optional: true
- waitForAnimationToEnd
- pressKey: back
- waitForAnimationToEnd
- pressKey: back
- waitForAnimationToEnd


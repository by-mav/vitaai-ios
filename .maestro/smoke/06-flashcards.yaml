appId: com.bymav.vitaai
tags:
  - smoke
  - flashcards
---
# 06 - Flashcards: navigate to Estudos > Flashcards tab and verify UI
# Assumes user is logged in.
- launchApp

- extendedWaitUntil:
    visible:
      anyOf:
        - "dias de streak"
        - "Home"
        - "ESTUDOS"
    timeout: 15000

# Navigate to Estudos tab
- tapOn:
    text: "Estudo"
    optional: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      anyOf:
        - "Disciplinas"
        - "Flashcards"
    timeout: 8000

# Tap Flashcards tab
- tapOn: "Flashcards"
- waitForAnimationToEnd

- takeScreenshot: "06-flashcards-tab"

# If there are flashcard decks, try tapping the first one
# This is optional — if no decks exist, the test still passes
- tapOn:
    index: 0
    optional: true
- waitForAnimationToEnd

- takeScreenshot: "06-flashcard-session"

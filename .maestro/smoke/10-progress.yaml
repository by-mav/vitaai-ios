appId: com.bymav.vitaai
tags:
  - smoke
  - progress
  - insights
---
# 10 - Progress/Insights smoke: navigate to Insights tab and verify stats load
# Assumes user is logged in and on dashboard.
# Strings verified against strings.xml and InsightsScreen.kt.
# Tab label = "Insight" (NavGraph.kt line 202: BottomNavItem(Routes.INSIGHTS, "Insight", ...))
- launchApp

# Wait for dashboard
- extendedWaitUntil:
    visible: "Home"
    timeout: 15000

- takeScreenshot: "10-progress-dashboard"

# Navigate to Insights tab (label = "Insight", NOT "Insights")
- tapOn:
    text: "Insight"
    optional: true
- waitForAnimationToEnd

# Wait for Insights screen content
# Three possible states: loading (skeleton), empty state, or loaded data
# Empty state title: strings.xml insights_empty_title = "Sem dados suficientes"
# Loaded state card: testTag "insights_overview_card", header = "MÉDIA GERAL"
# Error state: strings.xml insights_error_loading = "Erro ao carregar insights"
- extendedWaitUntil:
    visible: "Insight"
    timeout: 10000

- takeScreenshot: "10-progress-tab-loaded"

# Verify stat cards when data is present
# StatCard labels from InsightsScreen.kt StatsRow():
#   - R.string.insights_this_week = "esta semana"
#   - R.string.insights_submitted = "entregues"
#   - R.string.insights_streak_label = "sequência"
- assertVisible:
    text: "esta semana"
    optional: true
- assertVisible:
    text: "entregues"
    optional: true
- assertVisible:
    text: "sequência"
    optional: true

# Verify overview card header when data is loaded
# strings.xml insights_overall_average = "MÉDIA GERAL"
- assertVisible:
    text: "MÉDIA GERAL"
    optional: true

# Verify empty state when no data
- assertVisible:
    text: "Sem dados suficientes"
    optional: true

- takeScreenshot: "10-progress-stats"

# Pull-to-refresh gesture to verify refresh does not crash
- scroll
- waitForAnimationToEnd

- takeScreenshot: "10-progress-after-refresh"

appId: com.bymav.vitaai
tags:
  - e2e
  - edge-case
---
- launchApp:
    clearState: false
    stopApp: false

- extendedWaitUntil:
    visible: ".*(?:Simulados|Acordar|Continuar).*"
    timeout: 25000

# Dismiss "Acordar Vita" splash if present
- tapOn:
    text: "Acordar Vita"
    optional: true
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd

# Navigate deep then use tab to go home
- tapOn:
    text: "Simulados"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Novo"
    optional: true
- waitForAnimationToEnd

# Home via tab
- tapOn:
    text: "Início"
    optional: true
- tapOn:
    text: "Home"
    optional: true
- tapOn:
    id: "tab_home"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "25-home-from-deep"

appId: com.bymav.vitaai
tags:
  - e2e
  - accessibility
---
# Large font / accessibility mode test
- launchApp:
    clearState: false
    stopApp: false

- extendedWaitUntil:
    visible: ".*(?:Simulados|Acordar|Continuar).*"
    timeout: 25000

# Dismiss "Acordar Vita" splash if present
- tapOn:
    text: "Acordar Vita"
    optional: true
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd

# Just verify app doesn't crash with current accessibility settings
- takeScreenshot: "60-accessibility-dashboard"
- scroll
- takeScreenshot: "60-accessibility-scrolled"

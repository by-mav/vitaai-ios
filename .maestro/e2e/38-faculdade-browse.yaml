appId: com.bymav.vitaai
tags:
  - e2e
  - interaction
---
- launchApp:
    clearState: false
    stopApp: false

- extendedWaitUntil:
    visible: ".*(?:Simulados|Acordar|Continuar).*"
    timeout: 25000

# Dismiss "Acordar Vita" splash if present
- tapOn:
    text: "Acordar Vita"
    optional: true
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd

# Faculdade: browse disciplines
- tapOn:
    text: "Faculdade"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "38-faculdade"
- scroll
- takeScreenshot: "38-faculdade-scroll"
- tapOn:
    text: "Início"
    optional: true
- tapOn:
    text: "Home"
    optional: true
- waitForAnimationToEnd

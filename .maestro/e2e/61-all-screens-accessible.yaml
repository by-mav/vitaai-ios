appId: com.bymav.vitaai
tags:
  - e2e
  - accessibility
---
- launchApp:
    clearState: false
    stopApp: false

- extendedWaitUntil:
    visible: ".*(?:Simulados|Acordar|Continuar).*"
    timeout: 25000

# Dismiss "Acordar Vita" splash if present
- tapOn:
    text: "Acordar Vita"
    optional: true
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd

# Open each screen — verify no crash (basic accessibility)
- tapOn:
    text: "Simulados"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "61-acc-sim"
- pressKey: back
- waitForAnimationToEnd

- tapOn:
    text: "Flashcards"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "61-acc-flash"
- pressKey: back
- waitForAnimationToEnd

- tapOn:
    text: "Progresso"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "61-acc-prog"

- tapOn:
    text: "Faculdade"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "61-acc-fac"

- tapOn:
    text: "Início"
    optional: true
- tapOn:
    text: "Home"
    optional: true
- waitForAnimationToEnd

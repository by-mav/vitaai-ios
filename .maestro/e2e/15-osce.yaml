appId: com.bymav.vitaai
tags:
  - e2e
  - osce
---
# Wait for dashboard
- launchApp:
    clearState: false
    stopApp: false

- extendedWaitUntil:
    visible: ".*(?:Simulados|Acordar|Continuar).*"
    timeout: 25000

# Dismiss "Acordar Vita" splash if present
- tapOn:
    text: "Acordar Vita"
    optional: true
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd


- takeScreenshot: "15-dashboard"

# Navigate to OSCE/Clinical Cases
- tapOn:
    text: "OSCE"
    optional: true
- tapOn:
    text: "Casos Clínicos"
    optional: true
- tapOn:
    text: "Casos Clinicos"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "15-osce"

- pressKey: back
- waitForAnimationToEnd

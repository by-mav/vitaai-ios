appId: com.bymav.vitaai
tags:
  - e2e
  - performance
---
- launchApp:
    clearState: false
    stopApp: false

- extendedWaitUntil:
    visible: ".*(?:Simulados|Acordar|Continuar).*"
    timeout: 25000

# Dismiss "Acordar Vita" splash if present
- tapOn:
    text: "Acordar Vita"
    optional: true
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd

# Tab switching — all 4 tabs rapidly
- tapOn:
    text: "Estudos"
    optional: true
- tapOn:
    text: "Estudo"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "41-tab-estudos"

- tapOn:
    text: "Faculdade"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "41-tab-faculdade"

- tapOn:
    text: "Progresso"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "41-tab-progresso"

- tapOn:
    text: "Início"
    optional: true
- tapOn:
    text: "Home"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "41-tab-home"

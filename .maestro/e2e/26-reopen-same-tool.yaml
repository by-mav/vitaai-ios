appId: com.bymav.vitaai
tags:
  - e2e
  - edge-case
---
- launchApp:
    clearState: false
    stopApp: false

- extendedWaitUntil:
    visible: ".*(?:Simulados|Acordar|Continuar).*"
    timeout: 25000

# Dismiss "Acordar Vita" splash if present
- tapOn:
    text: "Acordar Vita"
    optional: true
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd

# Open same tool twice
- tapOn:
    text: "Flashcards"
    optional: true
- waitForAnimationToEnd
- pressKey: back
- waitForAnimationToEnd
- tapOn:
    text: "Flashcards"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "26-reopen-flash"
- pressKey: back
- waitForAnimationToEnd

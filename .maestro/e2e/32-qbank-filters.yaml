appId: com.bymav.vitaai
tags:
  - e2e
  - interaction
---
- launchApp:
    clearState: false
    stopApp: false

- extendedWaitUntil:
    visible: ".*(?:Simulados|Acordar|Continuar).*"
    timeout: 25000

# Dismiss "Acordar Vita" splash if present
- tapOn:
    text: "Acordar Vita"
    optional: true
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd

# QBank: open → see filters → browse
- tapOn:
    id: "tool_questoes"
    optional: true
- tapOn:
    text: "Questões"
    optional: true
- tapOn:
    text: "Questoes"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "32-qbank-home"

# Scroll to see disciplines
- scroll
- takeScreenshot: "32-qbank-scrolled"

# Tap first discipline
- tapOn:
    index: 0
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "32-qbank-discipline"

- pressKey: back
- waitForAnimationToEnd
- pressKey: back
- waitForAnimationToEnd

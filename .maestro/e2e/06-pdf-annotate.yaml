appId: com.bymav.vitaai
tags:
  - e2e
  - pdfs
---
# Wait for dashboard
- launchApp:
    clearState: false
    stopApp: false

- extendedWaitUntil:
    visible: ".*(?:Simulados|Acordar|Continuar).*"
    timeout: 25000

# Dismiss "Acordar Vita" splash if present
- tapOn:
    text: "Acordar Vita"
    optional: true
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd


- takeScreenshot: "06-dashboard"

# Navigate to PDFs
- tapOn:
    text: "PDFs"
    optional: true
- tapOn:
    text: "Materiais"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "06-pdfs"

- pressKey: back
- waitForAnimationToEnd

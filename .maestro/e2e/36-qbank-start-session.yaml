appId: com.bymav.vitaai
tags:
  - e2e
  - interaction
---
- launchApp:
    clearState: false
    stopApp: false

- extendedWaitUntil:
    visible: ".*(?:Simulados|Acordar|Continuar).*"
    timeout: 25000

# Dismiss "Acordar Vita" splash if present
- tapOn:
    text: "Acordar Vita"
    optional: true
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd

# QBank: try starting a session
- tapOn:
    text: "Questões"
    optional: true
- tapOn:
    text: "Questoes"
    optional: true
- waitForAnimationToEnd

# Tap start/new session
- tapOn:
    text: "Iniciar"
    optional: true
- tapOn:
    text: "Nova"
    optional: true
- tapOn:
    text: "Começar"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "36-qbank-session"

- pressKey: back
- waitForAnimationToEnd
- pressKey: back
- waitForAnimationToEnd

appId: com.bymav.vitaai
tags:
  - e2e
  - edge-case
---
- launchApp:
    clearState: false
    stopApp: false

- extendedWaitUntil:
    visible: ".*(?:Simulados|Acordar|Continuar).*"
    timeout: 25000

# Dismiss "Acordar Vita" splash if present
- tapOn:
    text: "Acordar Vita"
    optional: true
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd

# Rapid navigation — tap all tabs fast, nothing crashes
- tapOn:
    text: "Estudos"
    optional: true
- tapOn:
    text: "Estudo"
    optional: true
- tapOn:
    text: "Faculdade"
    optional: true
- tapOn:
    text: "Progresso"
    optional: true
- tapOn:
    text: "Início"
    optional: true
- tapOn:
    text: "Home"
    optional: true
- tapOn:
    text: "Estudos"
    optional: true
- tapOn:
    text: "Estudo"
    optional: true
- tapOn:
    text: "Progresso"
    optional: true
- tapOn:
    text: "Início"
    optional: true
- tapOn:
    text: "Home"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "20-rapid-nav-survived"

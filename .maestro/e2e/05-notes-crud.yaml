appId: com.bymav.vitaai
tags:
  - e2e
  - notes
---
# Wait for dashboard
- launchApp:
    clearState: false
    stopApp: false

- extendedWaitUntil:
    visible: ".*(?:Simulados|Acordar|Continuar).*"
    timeout: 25000

# Dismiss "Acordar Vita" splash if present
- tapOn:
    text: "Acordar Vita"
    optional: true
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd


- takeScreenshot: "05-dashboard"

# Navigate to Estudos tab
- tapOn:
    id: "tab_estudos"
    optional: true
- tapOn:
    text: "Estudo"
    optional: true
- tapOn:
    text: "Estudos"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "05-estudos"

# Try to find Notes
- tapOn:
    text: "Notas"
    optional: true
- tapOn:
    text: "Notes"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "05-notes"

- pressKey: back
- waitForAnimationToEnd

appId: com.bymav.vitaai
tags:
  - e2e
  - progress
---
# Wait for dashboard
- launchApp:
    clearState: false
    stopApp: false

- extendedWaitUntil:
    visible: ".*(?:Simulados|Acordar|Continuar).*"
    timeout: 25000

# Dismiss "Acordar Vita" splash if present
- tapOn:
    text: "Acordar Vita"
    optional: true
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd


- takeScreenshot: "12-dashboard"

# Navigate to Progresso tab
- tapOn:
    id: "tab_progresso"
    optional: true
- tapOn:
    text: "Progresso"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "12-progresso"

- tapOn:
    id: "tab_home"
    optional: true
- tapOn:
    text: "Início"
    optional: true
- tapOn:
    text: "Home"
    optional: true
- waitForAnimationToEnd

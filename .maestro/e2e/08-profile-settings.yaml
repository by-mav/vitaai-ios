appId: com.bymav.vitaai
tags:
  - e2e
  - settings
---
# Wait for dashboard
- launchApp:
    clearState: false
    stopApp: false

- extendedWaitUntil:
    visible: ".*(?:Simulados|Acordar|Continuar).*"
    timeout: 25000

# Dismiss "Acordar Vita" splash if present
- tapOn:
    text: "Acordar Vita"
    optional: true
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd


- takeScreenshot: "08-dashboard"

# Open menu / navigate to profile
- tapOn:
    text: "Perfil"
    optional: true
- tapOn:
    id: "profile_screen"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "08-profile"

# Navigate to settings
- tapOn:
    text: "Configurações"
    optional: true
- tapOn:
    text: "Configuracoes"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "08-settings"

- pressKey: back
- waitForAnimationToEnd
- pressKey: back
- waitForAnimationToEnd

appId: com.bymav.vitaai
tags:
  - e2e
  - interaction
---
- launchApp:
    clearState: false
    stopApp: false

- extendedWaitUntil:
    visible: ".*(?:Simulados|Acordar|Continuar).*"
    timeout: 25000

# Dismiss "Acordar Vita" splash if present
- tapOn:
    text: "Acordar Vita"
    optional: true
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd

# Verify simulado config has options
- tapOn:
    text: "Simulados"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Novo"
    optional: true
- tapOn:
    text: "Novo Simulado"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "34-sim-config"

# Check for config elements
- tapOn:
    text: "10"
    optional: true
- tapOn:
    text: "Fácil"
    optional: true
- tapOn:
    text: "Facil"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "34-sim-config-set"

- pressKey: back
- waitForAnimationToEnd
- pressKey: back
- waitForAnimationToEnd

appId: com.bymav.vitaai
tags:
  - e2e
  - visual
---
- launchApp:
    clearState: false
    stopApp: false

- extendedWaitUntil:
    visible: ".*(?:Simulados|Acordar|Continuar).*"
    timeout: 25000

# Dismiss "Acordar Vita" splash if present
- tapOn:
    text: "Acordar Vita"
    optional: true
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Perfil"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "51g-perfil"
- pressKey: back
- waitForAnimationToEnd

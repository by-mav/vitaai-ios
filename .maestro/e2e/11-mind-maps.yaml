appId: com.bymav.vitaai
tags:
  - e2e
  - mindmaps
---
# Wait for dashboard
- launchApp:
    clearState: false
    stopApp: false

- extendedWaitUntil:
    visible: ".*(?:Simulados|Acordar|Continuar).*"
    timeout: 25000

# Dismiss "Acordar Vita" splash if present
- tapOn:
    text: "Acordar Vita"
    optional: true
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd


- takeScreenshot: "11-dashboard"

# Navigate to mind maps
- tapOn:
    text: "Mapas Mentais"
    optional: true
- tapOn:
    text: "Mindmaps"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "11-mindmaps"

- pressKey: back
- waitForAnimationToEnd

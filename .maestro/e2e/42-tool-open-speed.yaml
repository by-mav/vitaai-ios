appId: com.bymav.vitaai
tags:
  - e2e
  - performance
---
- launchApp:
    clearState: false
    stopApp: false

- extendedWaitUntil:
    visible: ".*(?:Simulados|Acordar|Continuar).*"
    timeout: 25000

# Dismiss "Acordar Vita" splash if present
- tapOn:
    text: "Acordar Vita"
    optional: true
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd

# Measure: open each tool and screenshot (fast = no loading spinners visible)
- tapOn:
    text: "Simulados"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "42-perf-sim"
- pressKey: back
- waitForAnimationToEnd

- tapOn:
    text: "Flashcards"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "42-perf-flash"
- pressKey: back
- waitForAnimationToEnd

- tapOn:
    text: "Questões"
    optional: true
- tapOn:
    text: "Questoes"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "42-perf-quest"
- pressKey: back
- waitForAnimationToEnd

name: Build & Deploy to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: testflight
  cancel-in-progress: true

jobs:
  build:
    name: Build & Upload
    runs-on: macos-14          # Apple Silicon (M1) runner
    timeout-minutes: 60

    env:
      SCHEME: VitaAI
      CONFIGURATION: Release
      ARCHIVE_PATH: ${{ github.workspace }}/build/VitaAI.xcarchive
      EXPORT_PATH: ${{ github.workspace }}/build/export

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Install XcodeGen ───────────────────────────────────────
      - name: Install XcodeGen
        run: brew install xcodegen

      # ── 3. Generate .xcodeproj ────────────────────────────────────
      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      # ── 4. Write App Store Connect API Key ───────────────────────
      - name: Write API Key
        run: |
          mkdir -p ~/.private_keys
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY }}" > ~/.private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

      # ── 5. Select correct Xcode version ──────────────────────────
      - name: Select Xcode 15
        run: sudo xcode-select -switch /Applications/Xcode_15.4.app

      # ── 6. Archive ───────────────────────────────────────────────
      - name: Archive
        run: |
          xcodebuild archive \
            -project VitaAI.xcodeproj \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -archivePath "$ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" \
            -authenticationKeyPath "$HOME/.private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            CODE_SIGN_STYLE=Automatic \
            | xcpretty --color || xcodebuild archive \
            -project VitaAI.xcodeproj \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -archivePath "$ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" \
            -authenticationKeyPath "$HOME/.private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            CODE_SIGN_STYLE=Automatic

      # ── 7. Export IPA ─────────────────────────────────────────────
      - name: Export IPA
        run: |
          # Inject team ID into ExportOptions
          /usr/libexec/PlistBuddy -c "Set :teamID ${{ secrets.APPLE_TEAM_ID }}" ExportOptions.plist

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$EXPORT_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" \
            -authenticationKeyPath "$HOME/.private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8"

      # ── 8. Upload to TestFlight ───────────────────────────────────
      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            -f "$EXPORT_PATH/VitaAI.ipa" \
            -t ios \
            --apiKey "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

      # ── 9. Upload dSYMs for crash symbolication ───────────────────
      - name: Upload dSYMs
        if: success()
        run: |
          xcrun altool --upload-dsym \
            "$ARCHIVE_PATH/dSYMs/VitaAI.app.dSYM" \
            -t ios \
            --apiKey "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"
        continue-on-error: true

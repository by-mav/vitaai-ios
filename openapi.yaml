  # 2026-04-22: Unified OAuth integrations (Google Drive/Calendar; Spotify pluggable)
  # 2026-04-22 fix: auth resolves to profile.id (user_integrations.userId FK)
  /api/integrations:
    get:
      tags: [integrations]
      operationId: listIntegrations
      summary: List all providers + current user's connection state
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        displayName: { type: string }
                        connected: { type: boolean }
                        status: { type: string }
                        providerAccountEmail: { type: string, nullable: true }
                        lastSyncAt: { type: string, format: date-time, nullable: true }
                        lastError: { type: string, nullable: true }
                        counts:
                          type: object
                          properties:
                            imported: { type: integer }
                            updated: { type: integer }
        '401': { description: Unauthorized }

  /api/integrations/{provider}:
    parameters:
      - name: provider
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [integrations]
      operationId: startIntegrationOAuth
      summary: Start OAuth — returns authUrl for mobile, 302 for web
      responses:
        '200':
          description: Mobile response with authUrl
          content:
            application/json:
              schema:
                type: object
                properties:
                  authUrl: { type: string }
        '302': { description: Web redirect to provider }
        '401': { description: Unauthorized }
        '404': { description: Provider not found }
    delete:
      tags: [integrations]
      operationId: revokeIntegration
      summary: Disconnect this provider for current user
      responses:
        '200': { description: OK }
        '401': { description: Unauthorized }

  /api/integrations/{provider}/callback:
    parameters:
      - name: provider
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [integrations]
      operationId: integrationCallback
      summary: OAuth callback from provider — redirects to vitaai:// deep link
      parameters:
        - name: code
          in: query
          required: true
          schema: { type: string }
        - name: state
          in: query
          required: true
          schema: { type: string }
      responses:
        '302': { description: Redirect to vitaai://integrations/done }
        '400': { description: Invalid code or state }

  /api/integrations/{provider}/status:
    parameters:
      - name: provider
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [integrations]
      operationId: getIntegrationStatus
      summary: Single provider status snapshot
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  connected: { type: boolean }
                  status: { type: string }
                  providerAccountEmail: { type: string, nullable: true }
                  lastSyncAt: { type: string, format: date-time, nullable: true }
                  lastError: { type: string, nullable: true }
                  counts:
                    type: object
                    properties:
                      imported: { type: integer }
                      updated: { type: integer }
        '401': { description: Unauthorized }
        '404': { description: Provider not found }

  /api/integrations/{provider}/sync:
    parameters:
      - name: provider
        in: path
        required: true
        schema:
          type: string
          enum: [google_calendar, google_drive]
    post:
      tags: [integrations]
      operationId: syncIntegration
      summary: Import data from a connected Google Calendar or Google Drive account
      responses:
        '200':
          description: Sync completed
          content:
            application/json:
              schema:
                type: object
                required: [ok, provider, imported, updated, skipped]
                properties:
                  ok: { type: boolean }
                  provider: { type: string }
                  imported: { type: integer }
                  updated: { type: integer }
                  skipped: { type: integer }
        '401': { description: Unauthorized }
        '404': { description: Provider not connected }
        '409': { description: Reconnect required or provider cannot sync }
        '502': { description: Provider API failed }

  # ════════════════════════════════════════
  # SCREEN BFF endpoints (1-RTT pre-aggregated payloads per tela)

  # ONBOARDING V2 + MEDICAL SPECIALTIES (Onda 5a, Rafael 2026-04-27)
  # SOT: agent-brain/decisions/2026-04-27_jornada-3lentes-FINAL.md §7
  # ════════════════════════════════════════

  /api/medical-specialties:
    get:
      tags: [onboarding]
      operationId: listMedicalSpecialties
      summary: Lista canônica CNRM/MEC de especialidades de residência médica
      description: |
        Retorna catálogo público (63 entries: 22 acesso direto + 41 com pré-requisito).
        Usado no onboarding v2 pra dropdown targetSpecialty quando journeyType=RESIDENCIA.
        Cache estável (max-age=3600, stale-while-revalidate=86400).
      responses:
        '200':
          description: Catálogo de especialidades
          content:
            application/json:
              schema:
                type: object
                properties:
                  directAccess:
                    type: array
                    items:
                      $ref: '#/components/schemas/MedicalSpecialty'
                  withPrerequisite:
                    type: array
                    items:
                      $ref: '#/components/schemas/MedicalSpecialty'
                  total:
                    type: integer
        '500':
          $ref: '#/components/responses/ServerError'

  /api/onboarding/v2:
    post:
      tags: [onboarding]
      operationId: submitOnboardingV2
      summary: Onboarding novo (P1+P2+P3 fork) — deriva journeyType + journeyConfig
      description: |
        Recebe payload com goal (P1), inFaculdade (P2), e campos específicos (P3 + jornada).
        Backend deriva automaticamente journeyType e journeyConfig
        usando a tabela canônica do plano (decisions/2026-04-27_jornada-3lentes-FINAL.md §7).

        Combinação inválida bloqueada: goal=FACULDADE + inFaculdade=graduated → HTTP 400.
        REVALIDA pula P2 (currentStage obrigatório).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingV2Request'
      responses:
        '200':
          description: Onboarding salvo com derivações aplicadas
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  profile:
                    type: object
                    additionalProperties: true
                  derived:
                    type: object
                    properties:
                      journeyType:
                        $ref: '#/components/schemas/JourneyType'
                      journeyConfig:
                        $ref: '#/components/schemas/JourneyConfig'
                      moment:
                        type: string
        '400':
          description: Combinação inválida (ex Faculdade+graduated) ou validação falhou
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'


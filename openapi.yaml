          type: string
          description: ISO 3166-1 alpha-2 country code
          example: BR
        countryName:
          type: string
          example: Brazil
        wdomsSchoolId:
          type: string
          nullable: true
        catalogSource:
          type: string
          example: wdoms
        sourceDetailUrl:
          type: string
          format: uri
          nullable: true
        sourceSnapshotDate:
          type: string
          format: date
          nullable: true

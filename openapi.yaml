      type: object
      description: |
        Payload do onboarding novo (Onda 5a). Backend deriva journeyType e
        journeyConfig via tabela canônica. contentOrganizationMode foi removido
        em 2026-07-16 — taxonomia = 1 árvore (vita-shell §1.1), sem lentes.

          description: 'Nível 2 da árvore (vita-shell §1.1): slug de disciplina.'
          schema:
            type: string
        - name: mode
          in: query
          schema:
            type: string
            enum: [due, specific, new]
            default: due
      responses:
        '200':
          description: Flashcard preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlashcardsPreviewResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        # A rota devolve 404 quando o authId nao tem user_profile (conta criada

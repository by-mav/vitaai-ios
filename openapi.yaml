      summary: ECG do extrator - recent runs with 12-domain coverage (admin only)
      description: |
        Returns the extractor ECG: recent `vita.extractor_runs` rows (join
        `user_profiles`), summary counts by status (last 7d), and top repeating
        assertions grouped by description. Consumed by /admin/extractor-health
        to render 12 verde/vermelho bolinhas per run + drawer with details.
      security:

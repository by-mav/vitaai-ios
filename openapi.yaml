    get:
      tags: [admin]
      operationId: mindmapData
      summary: Aggregate stats + markdown mindmap of VitaAI (gold standard)
      description: |
        Returns JSON { markdown, stats, timestamp } consumed by /vitaai-mindmap.html
        servido pelo container `mindmap-server` em monstro
        (http://monstro.tail7e98e6.ts.net:8888). Renderizado por markmap.

        Seções: Plataforma + Mapa da API · Banco de Dados · Disciplinas Catálogo ·
        Universidades · Mapeamento Universidade→Disciplina · Usuários (full detalhe
        por user) · Acadêmico agregado · Portal Coverage (categorias LMS/INSTITUCIONAL/
        AUXILIAR, cobertura LMS+Inst, distribuição, top mix, por estado, fingerprints) ·
        LGPD & Compliance (BYMAV LTDA + audio consent + retenção + telemetria) ·
        MCP Servers (vita-brain admin, vita-user gold, vita-catalog público) ·
        QBank · Simulados · Flashcards · VITA Coach · Studio/RAG · Notificações ·
        Atividades · Integrações · Custo LLM 7d · Infra (postgres + uptime + memory).

        Auth via ?token=<CRON_SECRET> query param. Não consumido por mobile.
      parameters:
        - in: query
          name: token
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Mindmap markdown + stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  markdown: { type: string }
                  stats:
                    type: object
                    additionalProperties: true
                    properties:
                      users: { type: integer }
                      universities: { type: integer }
                      qbank: { type: integer }
                      flashcards: { type: integer }
                      chatConversations: { type: integer }
                      tables: { type: integer }
                      subjects: { type: integer }
                      evaluations: { type: integer }
                      documents: { type: integer }
                      disciplines: { type: integer }
                      qbankTopics: { type: integer }
                      qbankInstitutions: { type: integer }
                      universityPortals: { type: integer }
                      portalsLMS: { type: integer }
                      portalsInstitucional: { type: integer }
                      portalsAuxiliar: { type: integer }
                      coverageCompleta: { type: integer }
                      coverageSoLMS: { type: integer }
                      coverageSoInstitucional: { type: integer }
                      coverageSemNada: { type: integer }
                      fingerprintsActive: { type: integer }
                      fingerprintsDeprecated: { type: integer }
                      audioConsentGrants: { type: integer }
                      portalsRecommended: { type: integer }
                      portalsVerifiedUse: { type: integer }
                      portalsUserAdded: { type: integer }
                      portalsValidationVerified: { type: integer }

  /api/study/flashcards/library/{slug}/sample:
    get:
      tags: [flashcards]
      operationId: getLibraryDeckSample
      summary: Amostra de cards do baralho da Biblioteca (antes de baixar)
      description: |
        Devolve algumas cartas do baralho para o aluno DECIDIR se baixa. Sem
        isso a tela de um baralho nao baixado ficava vazia ("Nenhum card
        ainda"), o que e mentira dupla: o baralho tem cards, e e curado — nao
        e do aluno criar. Rafael 2026-07-21.

        Amostra pega do inicio do baralho, sem midia (so texto), barata o
        suficiente pra abrir na hora. O download completo continua em
        `/library/{slug}/pack`.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string

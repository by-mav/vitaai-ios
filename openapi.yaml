    # ── QBank ──
    QBankFilters:
      type: object
      properties:
        groups:
          description: |
            Nível 1 da taxonomia canônica: as 6 GRANDES ÁREAS (vita.exam_great_areas),
            na ordem canônica (display_order). Cada item tem slug + name + count, e
            `children[]` = as DISCIPLINAS daquela área (nível 2). O nível 3 (temas)
            vai em `topics[]`.
            Taxonomia = 1 árvore só: ÁREA → DISCIPLINA → TEMA (vita-shell §1.1).
            As lentes (tradicional/pbl/great-areas) foram aposentadas em 2026-07-16.
          type: array
          items:
            type: object
            required: [slug, name, count]
            properties:
              slug:
                type: string
              name:
                type: string
              count:
                type: integer
              icon:
                type: string
                nullable: true
              displayOrder:
                type: integer
                nullable: true
              children:
                description: 'Filhos hierárquicos. Tradicional: temas (qbank_topics). PBL: clusters de sintomas. Added 2026-04-29.'
                type: array
                items:
                  type: object
                  required: [slug, name, count, parentSlug]
                  properties:
                    slug:
                      type: string
                    name:
                      type: string
                    count:
                      type: integer
                    parentSlug:
                      type: string
        institutions:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              slug:
                type: string
                nullable: true
              state:
                type: string
                nullable: true
              isResidence:
                type: boolean
              count:
                type: integer
        topics:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              disciplineSlug:
                type: string
                nullable: true
              count:
                type: integer
              iconSlug:
                type: string
                nullable: true
              disciplineName:
                type: string
                nullable: true
        disciplines:
          deprecated: true
          description: >
            [DEPRECATED 2026-04-17b] Catalog view from qbank_topics.disciplineSlug + vita.disciplines.
            Use GET /api/subjects instead — QBank must filter by the student's actual enrolled
            subjects, not the universal MedSimple catalog. This field stays for fallback during
            iOS/Android migration and may be removed in 2026-05.
          type: array
          items:
            type: object
            properties:
              slug:
                type: string
              name:
                type: string
              area:
                type: string
                nullable: true
              icon:
                type: string
                nullable: true
              topicCount:
                type: integer
              questionCount:
                type: integer
        years:
          type: array
          items:
            type: object
            properties:
              year:
                type: integer
              count:
                type: integer
        difficulties:
          type: array
          items:
            type: object
            properties:
              difficulty:
                type: string
              count:
                type: integer
        totalQuestions:
          type: integer
        totalAllStages:
          type: integer
          nullable: true
        stage:
          type: string
          nullable: true

    QBankPreviewRequest:
      type: object
      description: |
        Body do POST /api/qbank/preview. Todos os campos opcionais; backend aplica
        defaults conservadores. Filtro por taxonomia = 1 árvore (vita-shell §1.1):
        um campo por nível. As lentes morreram em 2026-07-16 — não existe `lens`.
      properties:
        areaSlugs:
          description: 'Nível 1: slugs das 6 grandes áreas (vita.exam_great_areas).'
          type: array
          items:
            type: string
          nullable: true
        disciplineSlugs:
          description: 'Nível 2: slugs de disciplina (vita.disciplines.slug).'
          type: array
          items:
            type: string
          nullable: true
        institutionIds:
          type: array
          items:
            type: integer
          nullable: true
        years:
          type: object
          nullable: true
          properties:
            min:
              type: integer
            max:
              type: integer
        yearList:
          description: >
            Anos avulsos marcados na lista de Questões (ex: [2015, 2019, 2024]).
            Quando não-vazio MANDA sobre `years` (vira `year IN (...)`), porque a
            faixa traria os anos do meio que o aluno não pediu. Inteiros fora de
            1990..2100 e além de 60 itens são descartados em silêncio (é entrada
            de UI, não API pública — nunca 400).
          type: array
          items:
            type: integer
          nullable: true
        difficulties:
          type: array
          items:
            type: string
            enum: [easy, medium, hard]
          nullable: true
        format:
          description: 'Filtro de formato. objective/discursive/withImage podem combinar.'
          type: array
          items:
            type: string
            enum: [objective, discursive, withImage]
          nullable: true
        hideAnswered:
          type: boolean
          nullable: true
          description: 'Oculta Q já respondidas pelo user.'
        hideAnnulled:
          type: boolean
          nullable: true
          description: 'Oculta Q anuladas (isCancelled=true).'
        hideReviewed:
          type: boolean
          nullable: true
          description: 'Oculta Q em listas de revisão do user.'
        excludeNoExplanation:
          type: boolean
          nullable: true
          description: 'Default true client-side. Drop Q sem comentário substancial.'
        includeSynthetic:
          type: boolean
          nullable: true
          description: 'Default false. Se false, exclui Q geradas por IA (isSynthetic=true).'

    QBankPreviewResponse:
      type: object
      required: [total]
      properties:
        total:
          type: integer
          description: 'Quantas Q batem com TODOS os filtros aplicados.'
        byDifficulty:
          type: object
          additionalProperties:
            type: integer
          description: >
            Contagem por dificuldade (easy/medium/hard) — facetada minus-self:
            reflete todos os OUTROS filtros aplicados menos a própria dificuldade.
        byYear:
          type: object
          additionalProperties:
            type: integer
          description: 'Contagem por ano (facetada minus-self).'
        byInstitution:
          type: object
          additionalProperties:
            type: integer
          description: 'Contagem por institutionId (facetada minus-self).'
        byFormat:
          type: object
          additionalProperties:
            type: integer
          description: 'Contagem por formato (objective/discursive/withImage), facetada minus-self.'
        # `facets` (espelho aninhado das contagens) é devolvido pelo backend e
        # consumido pelo DTO hand-written do iOS (QBankPreviewFacets). Não é
        # tipado aqui: o codegen swift6 gera tipo aninhado não-Hashable e o
        # cliente gerado deste response é órfão (o app usa o DTO próprio).
        # `topGroups` foi removido daqui em 2026-07-20: a rota NUNCA devolveu
        # esse campo — ele pertence ao preview de Simulado (SimuladoPreviewResp)
        # e veio parar aqui por cópia. Contrato prometendo campo inexistente é
        # drift, e o cliente que confiasse nele receberia sempre nulo.
        appliedJourneyBoost:
          type: string
          nullable: true
          description: 'Echo do journeyType usado pra ranking automático (debug-friendly).'

    SimuladoPreviewRequest:
      type: object
      description: |
        Body do POST /api/simulados/preview. Filtro por taxonomia = 1 árvore
        (vita-shell §1.1): um campo por nível. Sem `lens` (aposentada 2026-07-16).
      properties:
        areaSlugs:
          description: 'Nível 1: slugs das 6 grandes áreas (vita.exam_great_areas).'
          type: array
          items: { type: string }
          nullable: true
        disciplineSlugs:
          description: 'Nível 2: slugs de disciplina (vita.disciplines.slug).'
          type: array
          items: { type: string }
          nullable: true
        institutionIds:
          type: array
          items: { type: integer }
          nullable: true
        years:
          type: object
          nullable: true
          properties:
            min: { type: integer }
            max: { type: integer }
        yearList:
          description: >
            Anos avulsos marcados na lista. Não-vazio MANDA sobre `years`.
            Fora de 1990..2100 / acima de 60 itens = descartado em silêncio.
          type: array
          items: { type: integer }
          nullable: true
        difficulties:
          type: array
          items: { type: string, enum: [easy, medium, hard] }
          nullable: true
        format:
          type: array
          items: { type: string, enum: [objective, discursive, withImage] }
          nullable: true
        hideAnswered:
          type: boolean
          nullable: true
        hideAnnulled:
          type: boolean
          nullable: true
        excludeNoExplanation:
          type: boolean
          nullable: true
        includeSynthetic:
          type: boolean
          nullable: true
        questionCount:
          type: integer
          nullable: true
          description: 'Pra calcular estimatedMinutes (1.5 min/Q se !timed).'
        timed:
          type: boolean
          nullable: true
        timeLimitMinutes:
          type: integer
          nullable: true

    SimuladoPreviewResponse:
      type: object
      required: [total, estimatedMinutes]
      properties:
        total:
          type: integer
        estimatedMinutes:
          type: integer
          description: 'timeLimitMinutes se timed=true, senão questionCount * 1.5.'
        byDifficulty:
          type: object
          additionalProperties: { type: integer }
        byYear:
          type: object
          additionalProperties: { type: integer }
        topGroups:
          type: array
          items:
            type: object
            properties:
              slug: { type: string }
              name: { type: string }
              count: { type: integer }
        appliedJourneyBoost:
          type: string
          nullable: true

    FlashcardsPreviewResponse:

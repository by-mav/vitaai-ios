      responses:
        '200':
          description: Status
          content:
            application/json:
              schema:
                type: object
                properties:
                  phone: { type: string, nullable: true, description: E.164 without `+` (null if not linked) }
                  verified: { type: boolean }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/whatsapp/link:
    post:
      tags: [notifications]
      operationId: linkWhatsapp
      summary: Send a 6-digit OTP through the canonical wacli gateway
      description: |
        Generates a short-lived (10 min) 6-digit code, persists only its HMAC in
        `whatsapp_verifications`, and sends it as a WhatsApp message to the
        provided phone. Rate-limited to 1 request per minute per user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone:
                  type: string
                  description: E.164 without `+` (e.g. `5551993924561`). Non-digits are stripped.
      responses:
        '200':
          description: Code sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  phoneLast4: { type: string }
                  expiresAt: { type: string, format: date-time }
        '400':
          description: Invalid phone
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          description: Rate limited (cooldown 60s)
        '502':
          description: wacli unreachable / send failed; failed attempts do not block retry

  /api/whatsapp/verify:
    post:
      tags: [notifications]
      operationId: verifyWhatsapp
      summary: Confirm the OTP and flip whatsappVerified=true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  description: 6-digit code received on WhatsApp.
      responses:
        '200':
          description: Verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  verified: { type: boolean }
                  welcomeSent:
                    type: boolean
                    description: Whether the best-effort welcome message was delivered through wacli.
        '400':
          description: Wrong code / invalid format
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No active code (ask for a new one)
        '409':
          description: Phone is already linked to another Vita account
        '429':
          description: Too many wrong attempts (ask for a new code)

  /api/whatsapp/unlink:
    post:
      tags: [notifications]
      operationId: unlinkWhatsapp
      summary: Clear phone and whatsappVerified flag for the authenticated user
      responses:
        '200':
          description: Unlinked
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Profile not found

  /api/whatsapp/gateway/resolve:
    post:
      tags: [notifications]
      operationId: resolveWhatsappGatewayBinding
      summary: Resolve a verified Vita binding for the shared BYMAV WhatsApp gateway
      description: |
        Internal service endpoint protected by the strict `X-WACLI-TOKEN`.
        `eligible=true` is returned only when exactly one Vita profile owns an
        OAuth-derived, OTP-verified binding for the supplied phone. Duplicate
        bindings fail closed and no profile identifier is exposed.
      security: []
      parameters:
        - name: X-WACLI-TOKEN
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone: { type: string, example: "+5511999998888" }
      responses:
        '200':
          description: Binding eligibility without user data
          content:
            application/json:
              schema:
                type: object
                required: [app, eligible, bindingStatus]
                properties:
                  app: { type: string, enum: [vita] }
                  eligible: { type: boolean }
                  bindingStatus: { type: string, enum: [verified, not_linked, conflict] }
        '400':
          description: Invalid phone
        '401':
          description: Missing or invalid gateway token

  /api/whatsapp/webhook:
    post:
      tags: [notifications]
      operationId: whatsappInboundWebhook
      summary: Inbound webhook from the canonical wacli linked-device gateway
      description: |
        Accepts the wacli `message.new` event envelope or its native parsed-message
        payload. For each inbound message, deduplicates by `messageId` in
        `whatsapp_inbound_messages`,
        resolve user via `notification_preferences.whatsappPhone` (whatsappVerified=true),
        roda agent loop `runVitaChatTurn` (LiteLLM + MCPs vita-brain/user/catalog),
        e responde pelo mesmo wacli. Mensagens enviadas pelo próprio dispositivo
        são ignoradas para evitar loop.
      security: []
      parameters:
        - name: X-WACLI-TOKEN
          in: header
          required: false
          schema:
            type: string
          description: Shared wacli forwarder token. Native wacli webhooks are also identified by their User-Agent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              properties:
                event: { type: string, example: message.new }
                data:
                  type: object
                  additionalProperties: true
                  properties:
                    msgId: { type: string }
                    chatJid: { type: string }
                    senderJid: { type: string }
                    senderName: { type: string }
                    timestamp: { type: string, format: date-time }
                    fromMe: { type: boolean }
                    text: { type: string }
      responses:
        '200':
          description: Event processed or skipped
        '400':
          description: Invalid JSON
        '401':
          description: Request was not sent by wacli


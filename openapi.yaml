  /api/study/flashcards/decks:
    post:
      tags: [study, flashcards]
      operationId: createFlashcardDeck
      summary: Cria baralho vazio do aluno (idempotente por titulo)
      description: |
        Cria um flashcard_deck vazio (scope=user) pro aluno autenticado. Se ja
        existe deck do mesmo aluno com o mesmo titulo (case-insensitive, nao
        deletado) retorna o existente com existing=true em vez de duplicar.
        Aceita disciplineSlug (camelCase) ou discipline_slug (snake_case).
        Added 2026-07-12 (issue #188, T1).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlashcardDeckCreateRequest'
      responses:
        '200':
          description: Deck ja existia (idempotencia por titulo) — existing=true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlashcardDeckCreateResponse'
        '201':
          description: Deck criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlashcardDeckCreateResponse'
        '400':
          description: Body invalido (title 1..120 obrigatorio)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/study/flashcards/from-question:
    post:
      tags: [study, flashcards]
      operationId: createFlashcardFromQuestion
      summary: Converte questao errada do QBank em flashcard deterministico
      description: |
        Cria flashcard deterministico (sem LLM) a partir de uma questao do
        QBank, no deck "Questões erradas" do aluno (criado idempotente por
        titulo via ensureUserDeck). front = enunciado + alternativas com
        letras (A/B/C...); back = "Resposta: <LETRA>) <texto>" + explanation
        da questao. tag herda difficulty; o card nasce state=NEW e entra na
        fila de novos da sessao. Dedup por sourceQuestionId: se o aluno ja
        tem card vivo dessa questao devolve 200 existing=true sem criar nada.
        Aceita questionId (camelCase) ou question_id (snake_case).
        Added 2026-07-12 (issue #188, "Card da questao errada").
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlashcardFromQuestionRequest'
      responses:
        '200':
          description: Aluno ja tem card vivo dessa questao (dedup) — existing=true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlashcardFromQuestionResponse'
        '201':
          description: Flashcard criado no deck "Questões erradas"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlashcardFromQuestionResponse'
        '400':
          description: Body invalido (questionId int positivo obrigatorio)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Questao inexistente, inativa ou sem alternativa correta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Questao discursiva nao vira flashcard automatico
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/ServerError'


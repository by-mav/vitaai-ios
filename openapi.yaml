      description: |
        Retorna count de cards REVIEW vencidos (due), em LEARNING, e NEW (nunca
        vistos), filtrado opcionalmente por groupSlug (disciplineSlug do deck).
        Mode `due|specific|new` ajusta o `projectedSessionTime`. Added 2026-04-29.
        `topDecks` NAO respeita o groupSlug de proposito: mostra as disciplinas
        do aluno inteiro, pra ele saber pra onde ir quando o filtro atual esvazia.
      parameters:
        - name: groupSlug

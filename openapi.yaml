          application/json:
            schema:
              $ref: '#/components/schemas/TranscricaoSettingsPatch'
      responses:
        '200':
          description: Settings atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranscricaoSettings'

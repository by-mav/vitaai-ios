  /api/cron/observability/app-store-reviews-fetch:
    get:
      tags: [internal]
      operationId: cronAppStoreReviewsFetch
      summary: Cron — fetch App Store reviews snapshot (added 2026-04-28, untracked stub)
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: OK
  /api/cron/observability/portal-health-snapshot:
    get:
      tags: [internal]
      operationId: cronPortalHealthSnapshot
      summary: Cron — portal health snapshot (added 2026-04-28, untracked stub)
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: OK
  /api/cron/observability/sentry-issues-snapshot:
    get:
      tags: [internal]
      operationId: cronSentryIssuesSnapshot
      summary: Cron — Sentry issues snapshot (added 2026-04-28, untracked stub)
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: OK
  /api/cron/observability/trigger-runs-snapshot:
    get:
      tags: [internal]
      operationId: cronTriggerRunsSnapshot
      summary: Cron — Trigger.dev runs snapshot (added 2026-04-28, untracked stub)
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: OK
  /api/cron/cleanup-sessions:
    get:
      tags: [platform]
      operationId: cronCleanupSessions
      summary: Apaga sessoes expiradas da tabela session
      description: |
        Cron diario (03:23). DELETE FROM session WHERE expiresAt < NOW().
        better-auth nao apaga sessao vencida sozinho (issues 1046, 3882);
        medido 2026-07-20: 16 de 32 sessoes eram lixo. So o vencido; sessao
        viva nunca e tocada. Idempotente. Contagem via RETURNING (rowCount vinha 0).
      security: []
      responses:
        200:
          description: Faxina executada
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  removidas: { type: integer }
        401:
          description: CRON_SECRET invalido
  /api/cron/portal-sync:
    get:
      tags: [internal]
      operationId: cronPortalSync
      summary: Periodic Canvas PAT sync worker
      description: "Protected by CRON_SECRET bearer token. Not for client use. Processes active Canvas PAT connections, writes audit trail to vita.sync_logs, refreshes Canvas data through the API, and advances lastSyncAt/lastPingAt on success."
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Sync results
          content:
            application/json:
              schema:
                type: object
                properties:
                  processed:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/cron/portal-normalize:
    get:
      tags: [internal]
      operationId: cronPortalNormalize
      summary: Re-run the portal_grades → academic_subjects promoter for every active connection
      description: |
        Protected by CRON_SECRET bearer. Useful when the promoter logic changed
        (e.g. approved history wasn't being surfaced) or when a connector is
        Cloudflare-blocked but the raw rows in portal_grades are still valid —
        triggers normalizePortalData(userId) per active connection owner.
        Does NOT fetch anything from the portal; purely in-DB reconciliation.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Reconcile results
          content:
            application/json:
              schema:
                type: object
                properties:
                  processed: { type: integer }
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        userId: { type: string }
                        ok: { type: boolean }
                        error: { type: string, nullable: true }
        '401':
          $ref: '#/components/responses/Unauthorized'


  /api/cron/close-stale-read-sessions:
    get:
      tags: [internal]
      operationId: cronCloseStaleReadSessions
      summary: Close qbank_sessions left active for more than 1 hour
      description: |
        Cron runs every minute. Marks qbank_sessions with status='active' and
        createdAt older than 1 hour as 'abandoned'. Without this, sessions pile
        up forever and iOS "Recent Sessions" UI shows stale placeholders.
        Protected by CRON_SECRET bearer token.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cleanup result
          content:
            application/json:
              schema:
                type: object
                properties:
                  closedCount:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'


  /api/portal/force-sync:
    post:
      tags: [internal]
      operationId: portalForceSync
      summary: Force Canvas re-sync with API token
      description: Protected by CRON_SECRET. Accepts a Canvas Personal Access Token to re-scrape and ingest data.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                connectionId:
                  type: string
                  nullable: true
                token:
                  type: string
              required: [token]
      responses:
        '200':
          description: Sync results
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  scrape:
                    type: object
                  ingest:
                    type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/mcp:
    post:
      tags: [internal]
      operationId: mcpEndpoint
      summary: MCP (Model Context Protocol) endpoint for AI agents
      description: Internal MCP server endpoint for AI agent tools. Not for client use.
      responses:
        '200':
          description: MCP response


  /api/mcp/user:
    post:
      tags: [internal]
      operationId: mcpUserEndpoint
      summary: vita-user MCP endpoint (user-scoped tools)
      description: |
        User-scoped MCP server. Exposes 64 user-scoped tools (admin-only blocked: run_query, write_query, reset_user_academic_data, get_catalog_status, list_tools)
        that act on behalf of the authenticated user only. Auth via
        `x-internal-request` + `x-internal-secret` + `x-user-id`
        (internal proxy) or OAuth Bearer (Custom Connector — claude.ai /
        Claude Desktop, via the /oauth flow; JWT sub = user_profiles.id).
      responses:
        '200':
          description: MCP response (Streamable HTTP — SSE or JSON)
        '401':
          description: |
            Unauthorized — no valid auth. Inclui header `WWW-Authenticate`
            (RFC 9728) apontando pro resource metadata, pra o Claude iniciar
            o OAuth flow (Custom Connector).
    get:
      tags: [internal]
      operationId: mcpUserEndpointGet
      summary: vita-user MCP endpoint (SSE stream)
      responses:
        '200':
          description: MCP SSE stream
        '401':
          description: Unauthorized — inclui `WWW-Authenticate` (RFC 9728) pro OAuth flow
  /api/mcp/catalog:
    post:
      tags: [internal]
      operationId: mcpCatalogEndpoint
      summary: vita-catalog MCP endpoint (public catalog tools)
      description: |
        Public MCP server exposing the curated catalog: 355 universities,
        56 canonical disciplines, 361 portals, professor profiles, cities, states.
        No auth — safe for onboarding flows and claude.ai web connector.
        15 read-only tools covering search/list/get across every catalog entity.
      responses:
        '200':
          description: MCP response (Streamable HTTP — SSE or JSON)
    get:
      tags: [internal]
      operationId: mcpCatalogEndpointGet
      summary: vita-catalog MCP endpoint (SSE stream)
      responses:
        '200':
          description: MCP SSE stream
  # ════════════════════════════════════════
  # PORTAL
  # ════════════════════════════════════════

  /api/pdf/masks/attempt:
    post:
      tags: [pdf]
      operationId: recordPdfMaskAttempt
      summary: Record a Study Mode mask attempt (acertou/errou)
      description: |
        UPSERT em (userId, documentId, maskId). Se a máscara já tem registro,
        attempts++, e correct soma 1 se acertou. lastAttemptAt = now().
        iOS chama em fire-and-forget — falha silenciosa OK (UserDefaults é SOT
        primária local).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [documentId, maskId, pageIndex, bbox, correct]
              properties:
                documentId: { type: string }
                maskId: { type: string }
                pageIndex: { type: integer }
                bbox:
                  type: object
                  required: [x, y, width, height]
                  properties:
                    x: { type: number }
                    y: { type: number }
                    width: { type: number }
                    height: { type: number }
                correct: { type: boolean }
      responses:
        '200':
          description: Attempt registrada (UPSERT)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  row:
                    type: object
        '400': { description: Bad payload }
        '401': { description: Unauthorized }
  /api/pdf/masks/attempts/{documentId}:
    get:
      tags: [pdf]
      operationId: listPdfMaskAttempts
      summary: List Study Mode attempts agregados pra um documento
      parameters:
        - in: path
          name: documentId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Lista de máscaras com counters
          content:
            application/json:
              schema:
                type: object
                properties:
                  masks:
                    type: array
                    items:
                      type: object
                      properties:
                        maskId: { type: string }
                        pageIndex: { type: integer }
                        bbox: { type: object }
                        attempts: { type: integer }
                        correct: { type: integer }
                        lastAttemptAt: { type: string, format: date-time, nullable: true }
        '401': { description: Unauthorized }
  /api/pdf/annotations/{documentId}:
    put:
      tags: [pdf]
      operationId: uploadPdfAnnotations
      summary: Upload do PDF binário com anotações pro R2 (cross-device sync)
      description: |
        iOS envia o arquivo _highlights.pdf gerado pelo PDFKit. Backend salva
        no R2 e atualiza linha em vita.pdf_annotations (last-write-wins por
        userId+documentId, version++).
      parameters:
        - in: path
          name: documentId
          required: true
          schema: { type: string }
        - in: header
          name: X-Device-Id
          schema: { type: string }
          required: false
      requestBody:
        required: true
        content:
          application/pdf:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Upload registrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  row: { type: object }
        '401': { description: Unauthorized }
        '413': { description: Payload too large (>50MB) }
    get:
      tags: [pdf]
      operationId: downloadPdfAnnotations
      summary: Download do PDF binário com anotações (ou metadata via ?meta=1)
      parameters:
        - in: path
          name: documentId
          required: true
          schema: { type: string }
        - in: query
          name: meta
          schema: { type: string, enum: ["1"] }
          required: false
      responses:
        '200':
          description: |
            Binário PDF (default) ou JSON metadata se ?meta=1.
            Headers: X-Annotation-Version, X-Annotation-Sha256
          content:
            application/pdf:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: object
                properties:
                  version: { type: integer }
                  sha256: { type: string }
                  sizeBytes: { type: integer }
                  updatedAt: { type: string, format: date-time }
                  deviceId: { type: string, nullable: true }
        '401': { description: Unauthorized }
        '404': { description: Not synced yet }
  /api/portal/sync-now:
    post:
      tags: [portal]
      operationId: triggerPortalSyncNow
      summary: User-triggered re-sync of active Canvas connections
      description: |
        Used by iOS pull-to-refresh on the Connections screen and any future
        "Sincronizar agora" button. The canonical connector path is Canvas
        Personal Access Token only: the backend re-reads Canvas through the
        stored PAT, ingests the normalized academic data, and advances
        lastSyncAt/lastPingAt on success. There is no browser bridge,
        silent extraction, or non-Canvas dispatch in this endpoint.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                connectionIds:
                  type: array
                  items:
                    type: string
                  description: Optional. If empty/absent, re-syncs all active Canvas connections for the user.
      responses:
        '200':
          description: Canvas sync completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  dispatched:
                    type: object
                    properties:
                      canvas:
                        type: array
                        items:
                          type: object
                          properties:
                            synced:
                              type: boolean
                            error:
                              type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No active Canvas connections to sync
        '500':
          $ref: '#/components/responses/ServerError'

  /api/connectors/canvas/token:
    post:
      tags: [portal]
      operationId: connectCanvasToken
      summary: Connect Canvas using a Personal Access Token
      description: |
        Canonical Canvas mobile flow. The user provides a Canvas Personal Access
        Token and base URL. The backend validates the token against the Canvas
        REST API and stores the encrypted token on the authenticated user's
        portal connection.
      security:
        - cookieAuth: []
        - extensionToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              anyOf:
                - required: [baseUrl]
                - required: [base_url]
              properties:
                token:
                  type: string
                  format: password
                baseUrl:
                  type: string
                  example: https://ulbra.instructure.com
                base_url:
                  type: string
                  deprecated: true
                  description: Legacy mobile alias for baseUrl.
                  example: https://ulbra.instructure.com
      responses:
        '200':
          description: Canvas token validated and stored
          content:
            application/json:
              schema:
                type: object
                required: [connectionId, canvasUser, instanceUrl]
                properties:
                  connectionId:
                    type: string
                  instanceUrl:
                    type: string
                  canvasUser:
                    type: object
                    required: [id, name]
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      email:
                        type: string
                        nullable: true
        '400':
          description: Missing token/baseUrl or invalid Canvas URL
        '422':
          description: Canvas rejected the Personal Access Token
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/connectors/canvas/sync:
    post:
      tags: [portal]
      operationId: syncCanvasToken
      summary: Sync Canvas through the stored Personal Access Token
      security:
        - cookieAuth: []
        - extensionToken: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                connectionId:
                  type: string
      responses:
        '200':
          description: Canvas sync completed
          content:
            application/json:
              schema:
                type: object
                required: [ok, subjectsCreated, subjectsUpdated, evaluationsCreated, evaluationsUpdated]
                properties:
                  ok:
                    type: boolean
                  subjectsCreated:
                    type: integer
                  subjectsUpdated:
                    type: integer
                  evaluationsCreated:
                    type: integer
                  evaluationsUpdated:
                    type: integer
                  files:
                    type: integer
                  calendarEvents:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Canvas connection not found
        '409':
          description: Stored Canvas credential is missing or not token-based
        '502':
          description: Portal ingest failed

  /api/connectors/moodle/token:
    post:
      tags: [portal]
      operationId: connectMoodleToken
      summary: Connect Moodle using an official Web Service token
      description: |
        Validates the student token with `core_webservice_get_site_info`,
        protects it with the Vita credential cipher, and persists the active
        Moodle portal connection.
      security:
        - cookieAuth: []
        - extensionToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              anyOf:
                - required: [baseUrl]
                - required: [base_url]
              properties:
                token: { type: string, format: password }
                baseUrl: { type: string, example: https://moodle.example.edu }
                base_url:
                  type: string
                  deprecated: true
                  description: Legacy mobile alias for baseUrl.
                  example: https://moodle.example.edu
      responses:
        '200':
          description: Moodle token validated and stored
          content:
            application/json:
              schema:
                type: object
                required: [connectionId, instanceUrl, moodleSite]
                properties:
                  connectionId: { type: string }
                  instanceUrl: { type: string }
                  moodleSite:
                    type: object
                    required: [userId, fullName]
                    properties:
                      userId: { type: integer }
                      fullName: { type: string }
                      userName: { type: string, nullable: true }
                      siteName: { type: string, nullable: true }
        '400': { description: Missing token/baseUrl or invalid Moodle URL }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { description: Moodle rejected the Web Service token }

  /api/connectors/moodle/sync:
    post:
      tags: [portal]
      operationId: syncMoodleToken
      summary: Sync Moodle through the stored Web Service token
      security:
        - cookieAuth: []
        - extensionToken: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                connectionId: { type: string }
      responses:
        '200':
          description: Moodle sync completed
          content:
            application/json:
              schema:
                type: object
                required: [ok, connectionId, subjects, evaluations, files, calendarEvents, warnings]
                properties:
                  ok: { type: boolean }
                  connectionId: { type: string }
                  subjects: { type: integer }
                  evaluations: { type: integer }
                  files: { type: integer }
                  calendarEvents: { type: integer }
                  warnings:
                    type: array
                    items: { type: string }
        '401': { description: Unauthorized }
        '404': { description: Moodle connection not found }
        '409': { description: Moodle connection requires reconnect }
        '502': { description: Moodle API or sync failed }

  /api/portal/status:
    get:
      tags: [portal]
      operationId: portalStatus
      summary: Get Canvas and Moodle connection status
      security:
        - cookieAuth: []
        - extensionToken: []
      responses:
        '200':
          description: Per-connection status and academic counts for Canvas and Moodle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'


  /api/portal/calibration/preview:
    get:
      tags: [portal]
      operationId: portalCalibrationPreview
      summary: Pioneer Mode — preview extracted data for calibration review
      description: |
        Returns the extracted academic data (subjects, grades, schedule,
        evaluations) for the user's most recent (or specified) portal
        connection, plus calibration metadata (isPioneer flag, calibrationCount,
        confidenceScore) so the iOS/Android client can render the
        PortalCalibrationScreen for the 1st aluno of an university to review
        and correct the data before it is shown elsewhere in the app.

        Spec: agent-brain/portal-pioneer-mode.md
      security:
        - cookieAuth: []
        - extensionToken: []
      parameters:
        - in: query
          name: syncId
          required: false
          schema: { type: string }
        - in: query
          name: connectionId
          required: false
          schema: { type: string }
      responses:
        '200':
          description: Calibration preview payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  syncId: { type: string, nullable: true }
                  connectionId: { type: string }
                  universityId: { type: string, nullable: true }
                  universityName: { type: string, nullable: true }
                  portalType: { type: string }
                  instanceUrl: { type: string, nullable: true }
                  fingerprintId: { type: string, nullable: true }
                  fingerprintVersion: { type: integer, nullable: true }
                  isPioneer: { type: boolean }
                  calibrationCount: { type: integer }
                  confidenceScore: { type: number }
                  extracted:
                    type: object
                    properties:
                      subjects: { type: array, items: { type: object, additionalProperties: true } }
                      grades: { type: array, items: { type: object, additionalProperties: true } }
                      evaluations: { type: array, items: { type: object, additionalProperties: true } }
                      schedule: { type: array, items: { type: object, additionalProperties: true } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404':
          description: No active portal connection
        '500': { $ref: '#/components/responses/ServerError' }

  /api/portal/calibration/submit:
    post:
      tags: [portal]
      operationId: portalCalibrationSubmit
      summary: Pioneer Mode — submit user calibrations for the active fingerprint
      description: |
        Persists user corrections to vita.portal_calibrations, applies them
        to academic_subjects rows, and bumps portal_fingerprints
        calibrationCount + lastCalibratedAt. Future Fase 2 will enqueue
        a Haiku Teacher retrain job using these calibrations as few-shot
        examples to regenerate fingerprint v+1.

        Spec: agent-brain/portal-pioneer-mode.md
      security:
        - cookieAuth: []
        - extensionToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [connectionId, calibrations]
              properties:
                syncId: { type: string, nullable: true }
                connectionId: { type: string }
                fingerprintId: { type: string, nullable: true }
                fingerprintVersion: { type: integer, nullable: true }
                calibrations:
                  type: array
                  items:
                    type: object
                    required: [domain, extractedRaw, correctedValue, editType]
                    properties:
                      domain: { type: string, description: "subjects | grades | schedule | professors | calendar | etc" }
                      fieldPath: { type: string, nullable: true }
                      extractedRaw: { type: object, additionalProperties: true }
                      correctedValue: { type: object, additionalProperties: true }
                      editType:
                        type: string
                        enum: [confirmed, renamed, added, removed, value_changed]
                      targetId:
                        type: string
                        nullable: true
                        description: "id of the academic_subjects/etc row to update (when applying corrections)"
      responses:
        '200':
          description: Calibration accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  calibrationsStored: { type: integer }
                  subjectsUpdated: { type: integer }
                  fingerprintRetrainScheduled: { type: boolean }
                  appliedToUserData: { type: boolean }
        '400':
          description: Invalid body
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404':
          description: Connection not found
        '500': { $ref: '#/components/responses/ServerError' }

  /api/portal/ingest:
    post:
      description: |
        Canvas ingest. Accepts only the backend-generated Canvas PAT/API payload
        with courses, assignments, files, calendarEvents, and optional extracted
        plan-document contents. Browser scraper payloads are rejected.
      tags: [portal]
      operationId: portalIngest
      summary: Ingest Canvas API data into the canonical academic model
      # 2026-04-09: internal phantom table cleanup (no API surface changes)
  # 2026-04-09: cron-to-ingest auth fix (internal, no API surface changes)
  # 2026-04-09: portal extraction uses vLLM direct, chat includes portal data (no API surface changes)
  # 2026-04-18: flash_cards.disciplineId now text UUID (schema drift fix matching live DB); no API surface change
  # 2026-04-20: Haiku plano-de-ensino extract via CLAUDE_CODE_OAUTH_TOKEN (no more x-api-key); no API surface change
  # 2026-04-27: portal notifications refactor — sendNotification unified dispatch + portal source/metadata in Notification schema (additive, no breaking change)
  # 2026-04-20: subject UPDATE via Drizzle native (raw SQL was silently failing on escape of long syllabus strings); no API surface change
  # 2026-04-20: cron-drives-Haiku — PDFs recém-baixados pro R2 disparam Haiku server-side (plano extract sem iOS inline)
  # 2026-04-20: cron-haiku-backfill — varredura retroativa de planos já em R2 sem extraction (sem precisar download novo)
  # 2026-04-20: multi-format support — downloader fetches docx/xlsx/pptx to R2, backfill uses mammoth/xlsx parsers
  # 2026-04-20: Canvas module items scraping — files inside modules now discovered
  # 2026-04-22: ingest auto-calls normalizePortalData on success so academic_subjects fills immediately (no cron wait)
  # 2026-04-26: ingest persiste portalCreatedAt/portalModifiedAt em documents (file.created_at/modified_at do Canvas) — no API surface change, novos campos opcionais no payload
  # 2026-04-27: transcribe agora dispara generateChapters async + summary prompt pede [mm:ss] inline — no API surface change, novos campos opcionais em metadata
  # 2026-04-22: ingest response carries an `audit` field with canonical-model issues detected after normalize (#147 C7+E12)
  # 2026-04-22: dashboard 5.77s→0.12s (merge dup queries + agg SQL); Drizzle dev logger in src/db/index.ts
  # 2026-04-22: ingest response also carries `autofix` field with applied deterministic fixes (#147 E12-bis)
      security:
        - cookieAuth: []
        - extensionToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CanvasIngestPayload'
      responses:
        '200':
          description: Canvas ingest successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CanvasIngestResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'


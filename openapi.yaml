          format: date-time
          nullable: true

    StudyOverviewTranscricoes:
      type: object
      required: [total]
      properties:
        total:
          type: integer
        lastAt:
          type: string
          format: date-time
          nullable: true

    StudyOverviewSubject:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string

    CatalogStatusDiscipline:
      type: object
      required:
        - disciplineSlug
        - canonicalName
        - area
        - topicsN3
        - contentsN4
        - questionsActive
        - pctN3
        - pctN4
        - flashcardsTotal
        - flashcardsWithTopic
        - simuladosRef
        - gaps
      properties:
        disciplineSlug: { type: string }
        canonicalName: { type: string }
        area: { type: string }
        icon: { type: string, nullable: true }
        typicalSemester: { type: integer, nullable: true }
        topicsN3: { type: integer }
        topicsN3ExamContainers: { type: integer }
        contentsN4: { type: integer }
        questionsTotal: { type: integer }
        questionsActive: { type: integer }
        questionsWithN3: { type: integer }
        questionsWithN4: { type: integer }
        pctN3: { type: number }
        pctN4: { type: number }
        flashcardsTotal: { type: integer }
        flashcardsWithTopic: { type: integer }
        flashcardsNeedsTagging: { type: integer }
        simuladosRef: { type: integer }
        gaps:
          type: array
          items:
            type: string
            enum:
              - sem_topics_n3
              - low_n3_topics
              - sem_contents_n4
              - low_pct_n3
              - low_pct_n4
              - flashcards_without_topic
              - no_simulado_ref
              - too_many_exam_containers
        curado:
          type: boolean
          nullable: true
          description: null when area is out of scope (internato, vestibular)
        updatedAt: { type: string, format: date-time }

    PortalDiscoveryRun:
      type: object
      required:
        - id
        - universityId
        - universityName
        - portalType
        - instanceUrl
        - confidence
        - status
        - createdAt
      properties:
        id: { type: string, format: uuid }
        universityId: { type: string, format: uuid }
        universityName: { type: string }
        portalType:
          type: string
          enum: [canvas, moodle]
        instanceUrl: { type: string, format: uri }
        confidence: { type: number, description: "0.0-1.0 from Haiku" }
        rationale: { type: string, nullable: true }
        status:
          type: string
          enum: [pending, approved, rejected]
        reviewedBy: { type: string, nullable: true }
        reviewedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }

  responses:
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Authenticated but not allowed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    PlanLimit:
      description: Plan limit reached - upgrade required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PlanLimitError'
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    OpenSessionConflict:
      description: >
        Já existe uma sessão em aberto do mesmo tipo (regra "1 por tipo", 2026-07-21). O cliente
        mostra "retomar ou começar novo?"; reenviar com abandonExisting=true.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: open_session_exists
              openSession:
                $ref: '#/components/schemas/OpenSession'

paths:
  /api/farmaco/chat:
    post:
      tags: [ai]
      operationId: farmacoChat
      summary: Chat público do Caderno de Revisão de Farmacologia
      description: |
        Tutor de Farmacologia (material de estudo público). Sem auth, sem PII,
        read-only — repassa a pergunta pro LLM com o conteúdo do caderno no contexto.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  maxLength: 2000
                history:
                  type: array
                  items:
                    type: object
                    properties:
                      role: { type: string, enum: [user, assistant] }
                      content: { type: string }
      responses:
        '200':
          description: Resposta do tutor
          content:
            application/json:
              schema:
                type: object
                properties:
                  answer: { type: string }
        '400':
          description: Pergunta vazia ou JSON inválido
        '502':
          description: Falha ao falar com a IA
  # ════════════════════════════════════════
  # AUTH
  # ════════════════════════════════════════
  /api/auth/mobile-start:
    get:
      tags: [auth]
      operationId: mobileAuthStart
      summary: Start mobile OAuth flow
      security: []
      parameters:
        - name: provider
          in: query
          schema:
            type: string
            default: google
        - name: callbackURL
          in: query
          schema:
            type: string
      responses:
        '302':
          description: Redirect to OAuth provider

  /api/auth/mobile-callback:
    get:
      tags: [auth]
      operationId: mobileAuthCallback
      summary: OAuth callback - redirects to app deep link
      security: []
      responses:
        '302':
          description: Redirect to vitaai://auth/callback with unsigned session token, name, email, image, or error query params

  /api/auth/mobile-callback-onehub:
    get:
      tags: [auth]
      operationId: mobileAuthCallbackOneHub
      summary: OAuth callback - redirects to ONE Hub deep link
      security: []
      responses:
        '302':
          description: Redirect to onehub://auth/callback with token, name, email, image, or error query params

  /api/auth/mobile-apple:
    post:
      tags: [auth]
      operationId: mobileAppleAuth
      summary: Sign in with Apple identity token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                identityToken:
                  type: string
                fullName:
                  type: string
                  nullable: true
                email:
                  type: string
                  nullable: true
                nonce:
                  type: string
                  nullable: true
              required: [identityToken]
      responses:
        '200':
          description: Apple auth successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthToken'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/auth/review-token-redeem:
    post:
      tags: [auth]
      operationId: reviewTokenRedeem
      summary: Redeem App Store reviewer pre-shared token for a session
      description: >
        Internal endpoint used by `vitaai://review?token=<APPLE_REVIEW_TOKEN>` deep link.
        Validates the token matches `APPLE_REVIEW_TOKEN` env, signs the demo account
        (`apple.review@bymav.dev`) in via better-auth, and returns the session token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                  description: Pre-shared review token (env APPLE_REVIEW_TOKEN)
              required: [token]
      responses:
        '200':
          description: Redeem successful — session token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthToken'
        '401':
          description: Invalid review token
        '503':
          description: Review token flow not configured on this server
        '502':
          $ref: '#/components/responses/ServerError'

  /api/auth/{path}:
    get:
      tags: [auth]
      operationId: betterAuthCatchAllGet
      summary: better-auth catch-all (GET)
      security: []
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Varies by better-auth sub-route
    post:
      tags: [auth]
      operationId: betterAuthCatchAllPost
      summary: better-auth catch-all (POST)
      security: []
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Varies by better-auth sub-route


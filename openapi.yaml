  /api/study/flashcards/library:
    get:
      tags: [study]
      operationId: getFlashcardLibrary
      summary: Biblioteca Vita pela árvore canônica (área → disciplina)
      description: >-
        Os cards dos decks `scope='library'` agrupados pela taxonomia canônica
        (vita-shell §1.1), com contagem real por disciplina. Existe porque o deck
        da Biblioteca é um acervo ("Medicina" = 6.391 cards de Reumato + Nefro +
        Cardio…): listar o deck esconde tudo atrás de uma pilha. Card sem
        `disciplineSlug` fica de fora — não vira "Outros".
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Áreas com suas disciplinas e contagens
          content:
            application/json:
              schema:
                type: object
                properties:
                  areas:
                    type: array
                    items:
                      type: object
                      properties:
                        slug: { type: string }
                        name: { type: string }
                        total: { type: integer, description: cards da área }
                        due: { type: integer, description: cards vencidos (state != NEW) }
                        disciplines:
                          type: array
                          items:
                            type: object
                            properties:
                              slug: { type: string, description: vita.disciplines.slug }
                              name: { type: string }
                              total: { type: integer }
                              due: { type: integer }
                  totalCards: { type: integer }
                  totalDue: { type: integer }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'


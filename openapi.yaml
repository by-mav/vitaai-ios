              schema:
                type: object
                properties:
                  summary:
                    type: object
                    description: Counts of runs by status in last 7d
                    additionalProperties: true
                  topAssertions:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  runs:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        '401':

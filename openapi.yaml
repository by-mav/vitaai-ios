  /api/audio/upload-url:
    post:
      tags: [ai]
      operationId: createAudioUploadUrl
      summary: Pre-signed PUT URL for direct R2 audio upload
      description: |
        Returns a Cloudflare R2 pre-signed PUT URL so the client uploads the
        m4a directly to edge (global PoPs) instead of streaming through the
        app server. Also seeds a pending studio_sources row with status=uploading
        so the client list renders immediately.
      security:
        - cookieAuth: []
        - extensionToken: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                fileName:
                  type: string
                discipline:
                  type: string
                language:
                  type: string
                  description: Whisper BCP-47 hint (pt, en, es, …). Defaults to pt.
                durationSeconds:
                  type: number
                contentType:
                  type: string
                  default: audio/m4a
      responses:
        '200':
          description: Pre-signed URL issued
          content:
            application/json:
              schema:
                type: object
                required: [sourceId, r2Key, presignedPutUrl, expiresAt]
                properties:
                  sourceId:
                    type: string
                    format: uuid
                  r2Key:
                    type: string
                    description: Namespaced under the user's authId
                  presignedPutUrl:
                    type: string
                    format: uri
                  expiresAt:
                    type: string
                    format: date-time
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: R2 not configured on this environment

  /api/ai/transcribe/from-live:
    # 2026-04-24 fast-path: iOS transcreveu via WS live (WhisperLiveKit), só persiste.
    post:
      tags: [ai]
      operationId: transcribeFromLive
      # 2026-04-24 dispara async smart title via Qwen3 local quando !skippedLLM.
      summary: Persist a live-streamed transcript (skip Whisper)
      description: |
        Client already got a real-time transcript via WS `/asr`. Body includes
        the text + r2Key + sourceId. Server updates studio_sources (status=ready)
        and inserts a single chunk. No Whisper re-run, saves 2-9s per audio. Smart-title async via brain(classify) -> LiteLLM :8788 -> Qwen local (migrado 2026-04-27).
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sourceId, transcript]
              properties:
                sourceId: { type: string }
                r2Key: { type: string }
                transcript: { type: string }
                language: { type: string, default: pt }
                discipline: { type: string }
                durationSeconds: { type: number }
      responses:
        '200':
          description: Saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  sourceId: { type: string }
                  skippedLLM: { type: boolean }
        '401': { description: Unauthorized }
        '404': { description: Source not found }

  /api/ai/transcribe:
    # 2026-04-22: gated behind Pro/Premium — free users get 402 { upgrade:true }.
    # 2026-04-22 (late): backend agora chama /v1/audio/transcriptions do
    # faster-whisper-server (OpenAI-compat). Contrato público inalterado.
    post:
      tags: [ai]
      operationId: transcribeAudio
      # 2026-04-24: internal stripWhisperHallucinations filter applied to transcript
      summary: Transcribe audio file (SSE stream, up to 100MB)
      description: |
        Streams progress → transcript → summary → flashcards via SSE.
        2026-04-23 merge metadata preserving r2Key plus derive title plus skip LLM on transcript-lixo (issue ios-87)
        2026-04-23 controller-close duplicate fix in transcript-lixo guardrail.
        2026-04-23 gold — per-stage timing log (whisper_ms / llm_summary_ms / llm_flashcards_ms / total_ms) plus LIXO_CHECK verbose log.

        Accepts two bodies:
          1. `application/json` with `{r2Key, sourceId?, discipline?, language?}`
             after client PUT'd the m4a to R2 via `/api/audio/upload-url`.
             Preferred for mobile (aula de 1h = 50-100MB, não cabe em VPS RAM).
          2. `multipart/form-data` with `audio` file (+ optional `language`,
             `discipline`) — legacy path.

        On success persists studio_sources (type=audio), studio_source_chunks
        and studio_outputs (summary + flashcards); emits {type:"source_created", sourceId}
        so the client can deep-link to the saved source detail.
        Failures in persistence log but do not abort the stream.

        2026-04-24: LGPD retention — after a successful pipeline, if the user
        has `user_profiles.deleteAudioAfterTranscription = true` (default), the
        R2 m4a blob is deleted automatically. Public contract unchanged.
      security:
        - cookieAuth: []
        - extensionToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [r2Key]
              properties:
                r2Key:
                  type: string
                  description: Key returned by /api/audio/upload-url
                sourceId:
                  type: string
                  format: uuid
                  description: Pending studio_sources row id (if seeded by upload-url)
                discipline:
                  type: string
                language:
                  type: string
                  description: Whisper BCP-47 hint (pt, en, es, …). Defaults to pt.
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Audio file (max 100MB)
                language:
                  type: string
                discipline:
                  type: string
              required: [file]
      responses:
        '200':
          description: SSE stream with transcription progress
          content:
            text/event-stream:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          description: Plan limit reached (free users)
        '413':
          description: Audio too large (>100MB)
        '500':
          $ref: '#/components/responses/ServerError'


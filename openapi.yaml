    TrabalhoItem:
      description: |
        Single evaluation item (exam, assignment, quiz, seminar, participation).

        STATE RULES (CANONICAL — iOS/Android/Web MUST respect):
        - `type` is the ONLY source of the category label. Never hardcode "PROVA" for an
          assignment. exam→PROVA, assignment→TRABALHO, quiz→QUIZ, seminar→APRESENTAÇÃO,
          participation→PARTICIPAÇÃO.
        - `submitted`/`status` tell if it was turned in. When submitted=true, item lives
          in `completed` bucket of TrabalhosResponse.
        - "Overdue" is DERIVED: `submitted=false AND date<now`. Not a column. Backend
          computes and buckets into `overdue` — clients never re-derive.
      type: object
      properties:
        id: { type: string }
        title: { type: string, description: Verbatim title from Canvas or document extraction (e.g. "AD1 — Curso PNAISARI"). Never synthesized. }
        subjectName: { type: string }
        type:
          type: string
          enum: [exam, assignment, quiz, seminar, participation]
          example: assignment
          description: Category classification. Canvas/document extraction writes this from the LLM `kind` field.
        status:
          type: string
          enum: [pending, submitted, graded]
          example: pending
        submitted: { type: boolean, description: True when student turned it in. Canvas syncs this automatically. }
        submittedAt: { type: string, format: date-time, nullable: true }
        date: { type: string, format: date-time, nullable: true, description: Deadline. Used to derive overdue/urgent states. }
        daysUntil: { type: integer, nullable: true }
        pointsPossible: { type: number, nullable: true }
        score: { type: number, nullable: true }
        grade: { type: string, nullable: true }
        description: { type: string, nullable: true }
        descriptionHtml: { type: string, nullable: true }
        submissionTypes:
          type: array
          items: { type: string }
        canvasAssignmentId: { type: string, nullable: true }
        canGenerate: { type: boolean }
      required: [id, title, subjectName, type, status, submitted, submissionTypes, canGenerate]

    TrabalhosResponse:
      description: |
        Evaluations bucketed by state. Clients MUST respect the server's bucketing and
        never cross-mix pending↔overdue based on local date math — time zones will drift.

        - `pending`  → actionable: submitted=false AND (date IS NULL OR date>=now)
        - `completed`→ history:    submitted=true
        - `overdue`  → historical: submitted=false AND date<now. UI should de-emphasize
          (collapsed, muted, no primary CTA) — student can't act on it anymore.

        Hero card of /api/dashboard NEVER includes overdue — only pending with date>=now.
      type: object
      properties:
        pending:
          type: array
          description: A fazer (deadline ahead or no deadline)
          items: { $ref: '#/components/schemas/TrabalhoItem' }
        completed:
          type: array
          description: Entregues (history)
          items: { $ref: '#/components/schemas/TrabalhoItem' }
        overdue:
          type: array
          description: Vencidos sem entrega. Display as muted history — no primary CTA.
          items: { $ref: '#/components/schemas/TrabalhoItem' }
        total: { type: integer }
      required: [pending, completed, overdue, total]


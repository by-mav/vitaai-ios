  /api/admin/qbank/ingestion:
    get:
      tags: [admin, qbank]
      operationId: getQbankIngestionBatch
      summary: Read one quarantined PDF ingestion batch and its duplicate decisions
      parameters:
        - in: query
          name: batchId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Batch and ordered ingestion items
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { description: Batch not found }
    post:
      tags: [admin, qbank]
      operationId: mutateQbankIngestionBatch
      summary: Stage, resolve duplicates, approve or publish an official PDF exam
      description: >
        Admin-only state machine. stage writes only to quarantine. approve signs the exact
        SHA-256 review digest and never publishes. publish requires the already approved digest,
        the fixed 6/56/1,130 three-layer taxonomy, complete answer keys and resolved duplicates.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [stage, resolve, approve, publish]
                bundle:
                  type: object
                  additionalProperties: true
                  description: Required for stage; contractVersion must be qbank-ingestion/v1.
                batchId: { type: string, format: uuid }
                itemId: { type: string, format: uuid }
                expectedDigest:
                  type: string
                  pattern: '^[a-fA-F0-9]{64}$'
                decision:
                  type: string
                  enum: [keep_new, use_existing, reject]
                duplicateOfQuestionId: { type: integer }
                reason: { type: string }
      responses:
        '200':
          description: Mutation completed
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        '201':
          description: Bundle staged in quarantine
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { description: Admin permission required }
        '409': { description: 'State, digest or duplicate conflict' }
        '422': { description: Bundle failed the canonical ingestion contract }

  /api/simulados/official-exams:
    get:
      tags: [simulados]
      operationId: listOfficialQbankExams
      summary: Lista paginada de provas oficiais e blocos categorizados do QBank
      parameters:
        - in: query
          name: q
          schema: { type: string, maxLength: 120 }
          description: Busca por título, banca ou fonte
        - in: query
          name: stage
          schema:
            type: array
            items: { type: string }
          style: form
          explode: true
        - in: query
          name: year
          schema:
            type: array
            items: { type: integer, minimum: 1900, maximum: 2200 }
          style: form
          explode: true
        - in: query
          name: authority
          schema:
            type: array
            items: { type: string }
          style: form
          explode: true
        - in: query
          name: status
          schema:
            type: array
            items:
              type: string
              enum: [not_started, in_progress, completed]
          style: form
          explode: true
        - in: query
          name: sort
          schema:
            type: string
            enum: [newest, oldest, authority]
            default: newest
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        '200':
          description: Metadados leves, facets e paginação do catálogo de simulados
          content:
            application/json:
              schema:
                type: object
                required: [exams, pagination, facets]
                properties:
                  exams:
                    type: array
                    items:
                      type: object
                      required:
                        - id
                        - slug
                        - kind
                        - title
                        - authority
                        - source
                        - year
                        - stage
                        - institutionId
                        - questionCount
                        - availableQuestions
                        - attemptStatus
                        - answeredQuestions
                        - tags
                      properties:
                        id: { type: string }
                        slug: { type: string }
                        kind:
                          type: string
                          enum: [official, bank]
                        title: { type: string }
                        authority: { type: string }
                        source: { type: string }
                        year: { type: integer }
                        stage: { type: string }
                        institutionId: { type: integer }
                        questionCount: { type: integer }
                        timeLimitMinutes: { type: integer, nullable: true }
                        availableQuestions: { type: integer }
                        attemptStatus:
                          type: string
                          enum: [not_started, in_progress, completed]
                        answeredQuestions: { type: integer }
                        sessionId: { type: string, nullable: true }
                        tags:
                          type: object
                          required: [type, institution, year, source]
                          properties:
                            type:
                              type: string
                              enum: [residencia, enade, revalida, concurso, faculdade]
                            institution: { type: string }
                            year: { type: integer }
                            source: { type: string }
                  pagination:
                    type: object
                    required: [page, limit, total, hasMore]
                    properties:
                      page: { type: integer }
                      limit: { type: integer }
                      total: { type: integer }
                      hasMore: { type: boolean }
                  facets:
                    type: object
                    required: [stages, years, authorities, statuses]
                    properties:
                      stages:
                        type: array
                        items: { type: string }
                      years:
                        type: array
                        items: { type: integer }
                      authorities:
                        type: array
                        items: { type: string }
                      statuses:
                        type: array
                        items:
                          type: string
                          enum: [not_started, in_progress, completed]
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/simulados/generate:
    post:
      tags: [simulados]
      operationId: generateSimulado
      summary: Cria simulado custom a partir da árvore (área/disciplina + nº de questões)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: >-
                Escopo pela taxonomia canônica (vita-shell §1.1), com os mesmos nomes
                de /api/qbank/preview. Exige ao menos um de areaSlugs/disciplineSlugs
                (ou o `subject` legado).
              properties:
                areaSlugs:
                  description: 'Nível 1: slugs das 6 grandes áreas (vita.exam_great_areas).'
                  type: array
                  items:
                    type: string
                  nullable: true
                disciplineSlugs:
                  description: 'Nível 2: slugs de disciplina (vita.disciplines.slug).'
                  type: array
                  items:
                    type: string
                  nullable: true
                subject:
                  type: string
                  description: >-
                    [LEGADO] Uma disciplina; casa o slug exato ou sub-slugs por prefixo
                    ("clinica-medica" pega "clinica-medica-1"). Prefira areaSlugs, que
                    filtra pela coluna real examGreatAreaSlug.
                questionCount:
                  type: integer
                  nullable: true
                question_count:
                  type: integer
                  nullable: true
                timeLimitMinutes:
                  type: integer
                  nullable: true
                time_limit_minutes:
                  type: integer
                  nullable: true
      responses:
        '201':
          description: Attempt criado (id + questions[], mesmo shape do from-template)
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Body inválido (subject obrigatório)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          description: Limite semanal de simulados do plano atingido
        '409':
          $ref: '#/components/responses/OpenSessionConflict'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          description: Nenhuma questão disponível para a disciplina

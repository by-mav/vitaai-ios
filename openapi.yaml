  /api/qbank/filters:
    get:
      tags: [qbank]
      operationId: getQBankFilters
      summary: Get available filter options for QBank (taxonomia = 1 árvore desde 2026-07-16)
      description: |
        Retorna os filtros da árvore canônica (vita-shell §1.1):
        `groups[]` = as 6 grandes áreas (nível 1), cada uma com `children[]` =
        as disciplinas daquela área (nível 2); `topics[]` = temas (nível 3).
        Instituição, ano e dificuldade vêm como dimensões próprias.
      parameters:
        - name: stage
          in: query
          required: false
          description: 'Etapa (cursinho/graduação/residência/revalida), ou "all" pra ignorar. Default = profile.moment.'
          schema:
            type: string
      responses:
        '200':
          description: Filter options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QBankFilters'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/qbank/preview:
    post:
      tags: [qbank]
      operationId: previewQBankPool
      summary: Count + breakdown da pool ANTES de criar sessão (debounced)
      description: |
        Calcula em tempo real quantas Q batem com os filtros atuais. Usado
        pelo builder das telas Estudos pra atualizar o número grande do CTA
        sticky a cada toque. Substitui o hack `getQBankQuestions?limit=1`.
        Backend aplica boost invisível conforme `userProfiles.journeyType`
        (RESIDENCIA → isResidence; REVALIDA/ENAMED → INEP). Added 2026-04-28.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QBankPreviewRequest'
      responses:
        '200':
          description: Pool preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QBankPreviewResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'


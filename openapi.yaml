      description: |
        Consumed by the iOS AppDataManager to hydrate the Faculdade tab.
        Joins academic_schedule and academic_evaluations with academic_subjects
        so client gets subjectName directly (no separate lookups).
        Window defaults to ±30 days when from/to omitted.
      parameters:
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
      security:
        - cookieAuth: []
        - extensionToken: []
      responses:
        '200':
          description: Weekly agenda
          content:
            application/json:
              schema:
                type: object
                properties:
                  schedule:
                    type: array
                    items:
                      type: object
                      properties:
                        subjectName: { type: string }
                        dayOfWeek: { type: integer }
                        startTime: { type: string }
                        endTime: { type: string }
                        room: { type: string, nullable: true }
                        professor: { type: string, nullable: true }
                        slots: { type: integer }
                  evaluations:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        title: { type: string }
                        type: { type: string }
                        date: { type: string, nullable: true }
                        status: { type: string }
                        score: { type: number, nullable: true }
                        subjectName: { type: string, nullable: true }
                  summary:
                    type: object
                    properties:
                      totalClasses: { type: integer }
                      subjects: { type: integer }

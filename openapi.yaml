    post:
      tags: [qbank]
      operationId: createQBankSession
      summary: QBank session endpoints (taxonomia = 1 árvore, vita-shell §1.1)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                questionCount:
                  type: integer
                  nullable: true
                  minimum: 1
                  maximum: 500
                  description: >
                    Quantas questoes a sessao tera. Teto 500 (Rafael 2026-07-20).
                    Fora da faixa o servidor grampeia em vez de recusar; ausente
                    ou invalido cai no padrao de 40.
                institutionIds:
                  type: array
                  items:
                    type: integer
                  nullable: true
                years:
                  type: array
                  items:
                    type: integer
                  nullable: true
                yearList:
                  description: >
                    Anos avulsos marcados na lista. Alias canônico de `years` nesta
                    rota (aqui `years` sempre foi lista, nunca faixa); se vier
                    não-vazio, vence `years`.
                  type: array
                  items:
                    type: integer
                  nullable: true
                difficulties:
                  type: array
                  items:
                    type: string
                  nullable: true
                topicIds:
                  type: array
                  items:
                    type: integer
                  nullable: true
                subjectIds:
                  description: >
                    [PREFERRED 2026-04-17b] Filter questions by the student's academic_subjects.id.
                    Backend resolves each subjectId → disciplineSlug (via academic_subjects.disciplineSlug
                    or fuzzy match on canonicalName) and filters qbank_questions accordingly.
                    This is the SOT path — client should pass subjects the student is actually
                    enrolled in, not catalog slugs.
                  type: array
                  items:
                    type: string
                  nullable: true
                disciplineSlugs:
                  deprecated: true
                  description: >
                    [DEPRECATED] Direct filter by MedSimple catalog slug. Kept for fallback when
                    student has no academic_subjects (no portal connected yet). Prefer subjectIds.
                  type: array
                  items:
                    type: string
                  nullable: true
                areaSlugs:
                  description: 'Nível 1 da árvore (vita-shell §1.1): filtra qbank_questions.examGreatAreaSlug IN (...) — as 6 grandes áreas. Mesmo nome do campo em /api/qbank/preview: um nível, um nome, em toda rota.'
                  type: array
                  items:
                    type: string
                  nullable: true
                format:
                  description: 'Filtro de formato. objective/discursive/withImage. Added 2026-04-28.'
                  type: array
                  items:
                    type: string
                    enum: [objective, discursive, withImage]
                  nullable: true
                hideAnswered:
                  type: boolean
                  nullable: true
                  description: 'Oculta Q já respondidas pelo user. Added 2026-04-28.'
                hideAnnulled:
                  type: boolean
                  nullable: true
                  description: 'Oculta Q anuladas (isCancelled=true). Added 2026-04-28.'
                hideReviewed:
                  type: boolean
                  nullable: true
                  description: 'Oculta Q em listas de revisão. Added 2026-04-28.'
                onlyResidence:
                  type: boolean
                  nullable: true
                stage:
                  type: string
                  nullable: true
                onlyUnanswered:
                  type: boolean
                  nullable: true
                title:
                  type: string
                  nullable: true
                excludeNoExplanation:
                  type: boolean
                  nullable: true
                  description: >
                    Quality filter — drop questions com explanation NULL ou
                    length<=50 chars. Default true client-side. Added 2026-04-27.
                includeSynthetic:
                  type: boolean
                  nullable: true
                  description: >
                    Quality filter — when false, drop LLM-generated questions
                    (isSynthetic=true; year>=2025, source=medsimple). Default
                    true. Added 2026-04-27.
                abandonExisting:
                  type: boolean
                  nullable: true
                  description: >
                    Regra "1 sessão aberta global" (2026-07-19). true = fecha a
                    sessão em aberto (questões/flashcards/simulado) e cria a nova.
                    false + já existe aberta → 409.
                officialExamSlug:
                  type: string
                  nullable: true
                  description: >
                    Slug de uma prova oficial registrada. Quando presente, ignora
                    os filtros aleatórios e cria uma sessão com todas as questões
                    da prova na ordem canônica da banca.
                catalogBlockSlug:
                  type: string
                  nullable: true
                  description: >
                    Slug estável de um bloco BANCO do catálogo, derivado por fonte,
                    instituição, ano e tipo. Quando presente, materializa somente
                    questões daquele bloco e mantém o carregamento lazy.
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/QBankSession'
                  - type: object
                    properties:
                      officialExam:
                        type: object
                        nullable: true
                        description: Presente quando a sessão reproduz uma prova oficial.
                        properties:
                          slug: { type: string }
                          title: { type: string }
                          authority: { type: string }
                          source: { type: string }
                          year: { type: integer }
                          stage: { type: string }
                          institutionId: { type: integer }
                          questionCount: { type: integer }
                          timeLimitMinutes: { type: integer, nullable: true }
                          externalIdPrefix: { type: string }
                          sourceDownloadUrl: { type: string, format: uri }
                      catalogBlock:
                        type: object
                        nullable: true
                        description: Presente quando a sessão nasce de um bloco BANCO do catálogo.
                        properties:
                          id: { type: string }
                          slug: { type: string }
                          kind: { type: string, enum: [official, bank] }
                          title: { type: string }
                          authority: { type: string }
                          source: { type: string }
                          year: { type: integer }
                          stage:
                            type: string
                            enum: [residencia, enade, revalida, concurso, faculdade]
                          institutionId: { type: integer }
                          questionCount: { type: integer }
                          timeLimitMinutes: { type: integer, nullable: true }
                          availableQuestions: { type: integer }
        '409':
          description: >
            Já existe uma sessão em aberto do mesmo tipo (regra "1 por tipo"). O cliente mostra
            "retomar ou começar novo?"; reenviar com abandonExisting=true.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: open_session_exists
                  openSession:
                    $ref: '#/components/schemas/OpenSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'


        deckId:
          type: string
          nullable: true
        title:
          type: string
          maxLength: 120
          nullable: true

    OpenSession:
      type: object
      description: >
        Sessão em aberto (regra "1 por tipo", 2026-07-21) — normalizada das 3
        tabelas (questões/flashcards/simulado). A Home lê pra o card "continuar";
        o guard de criação lê pra bloquear/prompt.
      required: [type, id, title, currentIndex, total, startedAt]
      properties:
        type:
          type: string
          enum: [questions, flashcards, simulado]
        id:
          type: string
        title:
          type: string
        currentIndex:
          type: integer
          description: Questões respondidas / cards vistos (0 em simulado).
        total:
          type: integer
        startedAt:
          type: string
          format: date-time

    FlashcardSessionResponse:
      type: object
      required: [sessionId, cardIds, totalCards, expectedMinutes, budget]
      properties:
        sessionId:
          type: string
          format: uuid
          description: 'UUID persistido no servidor; a fila pode ser retomada depois de fechar o app.'
        cardIds:
          type: array
          items: { type: string }
          description: 'Ordem da fila SRS (mais atrasado primeiro).'
        cards:
          type: array
          description: >-
            A fila JÁ com o conteúdo de cada card (front/back/state/nextReviewAt/
            stability/difficulty/reps/lapses/tag), na mesma ordem de cardIds. O
            cliente estuda direto disto, sem 2ª chamada — e pode persistir pra
            offline. Added 2026-07-17.
          items:
            type: object
            properties:
              id: { type: string }
              deckId: { type: string, nullable: true }
              front: { type: string }
              back: { type: string }
              state: { type: string }
              nextReviewAt: { type: string, format: date-time, nullable: true }
              stability: { type: number }
              difficulty: { type: number }
              reps: { type: integer }
              lapses: { type: integer }
              tag: { type: string, nullable: true }
        totalCards:
          type: integer
        expectedMinutes:
          type: integer
        budget:
          type: object
          nullable: true
          description: 'Orcamento do dia de estudo (rollover 04:00 BRT): ja feito hoje + quanto resta pro modo pedido. Added 2026-07-12 (issue #188, T3).'
          required: [newIntroducedToday, reviewsToday, remaining]
          properties:
            newIntroducedToday:
              type: integer
              description: 'Cards que eram NEW e foram revisados hoje (wasNew no log).'
            reviewsToday:
              type: integer
              description: 'Total de revisoes de hoje (novos + repetidos).'
            remaining:
              type: integer
              description: 'Quanto resta do teto do modo pedido (new -> newPerDay, demais -> maxReviewsPerDay).'


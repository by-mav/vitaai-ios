      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [transactionId, productId, bundleId, signedTransaction]
              properties:
                transactionId:
                  type: string
                productId:
                  type: string
                  enum: [com.bymav.vitaai.pro, com.bymav.vitaai.premium]
                bundleId:
                  type: string
                  enum: [com.bymav.vitaai]
                signedTransaction:
                  type: string
                  description: Apple-signed StoreKit 2 JWS transaction.
      responses:
        '200':
          description: Verified active entitlement
          content:
            application/json:
              schema:
                type: object
                required: [ok, plan, periodEnd, environment]
                properties:
                  ok: { type: boolean, enum: [true] }
                  plan: { type: string, enum: [pro, premium] }
                  periodEnd: { type: string, format: date-time }
                  environment: { type: string, enum: [Production, Sandbox] }
        '400':
          description: Invalid, expired, revoked, or mismatched Apple transaction
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':

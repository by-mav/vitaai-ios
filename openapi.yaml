      operationId: getStudioSource
      summary: Get a single source
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Source
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudioSource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    patch:
      tags: [studio]
      operationId: updateStudioSource
      summary: Rename, move or favorite a source
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 200
                disciplineSlug:
                  type: string
                  nullable: true
                favorite:
                  type: boolean
                folderId:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [studio]
      operationId: deleteStudioSource
      summary: Delete a source (hard delete; R2 blob erased for audio)
      description: |
        LGPD right-to-erasure endpoint. Hard-deletes the `studio_sources`
        row (`studio_source_chunks` cascade via FK). For audio sources the
        R2 m4a (`metadata.r2Key`) is also deleted best-effort so the raw
        bytes disappear, not just the DB pointer. Issue #172.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/studio/upload:
    post:
      tags: [studio]
      operationId: uploadStudioSource
      summary: Upload a source file (PDF, images, audio - max 20MB)
      description: >-
        Sobe o arquivo pro R2 e dispara a extração em background (fire-and-forget):
        o source nasce `status=processing` e vira `ready` (ou `error`) — acompanhe
        por GET /api/studio/sources/{id}. O contrato não mudou em 2026-07-17; só a
        extração, que lia o arquivo pela própria API autenticada e levava 401.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required: [file]
      responses:
        '200':
          description: Upload successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  sourceId:
                    type: string
                  fileName:
                    type: string
                  mimeType:
                    type: string
                  sizeBytes:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/studio/upload/{filename}:
    get:
      tags: [studio]
      operationId: getStudioUploadedFile
      summary: Download an uploaded file
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Binary file content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'


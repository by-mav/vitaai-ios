  /api/user/journey:
    get:
      tags: [user]
      operationId: getUserJourney
      summary: Get current user journey (type + config)
      description: |
        Returns the user's chosen journey (FACULDADE, INTERNATO, ENAMED,
        RESIDENCIA ou REVALIDA) and its config blob (semester, institution,
        targetSpecialty, etc — varia por tipo). Default 'FACULDADE' para users
        existentes via backfill da migration 0077.
      responses:
        '200':
          description: User journey
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserJourney'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    patch:
      tags: [user]
      operationId: updateUserJourney
      summary: Update user journey (type + config) — drives Jornada tab template
      description: |
        Atualiza journeyType e/ou journeyConfig do usuário. Pode mandar só um
        dos dois campos ou os dois juntos. journeyType obriga estar no enum
        canônico (FACULDADE/INTERNATO/ENAMED/RESIDENCIA/REVALIDA) — qualquer
        valor fora retorna 400.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                journeyType:
                  $ref: '#/components/schemas/JourneyType'
                journeyConfig:
                  $ref: '#/components/schemas/JourneyConfig'

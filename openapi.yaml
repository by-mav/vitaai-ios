  /api/admin/catalog-status:
    get:
      tags: [admin]
      operationId: getAdminCatalogStatus
      summary: Catalog curation status (admin only)
      description: |
        Returns hierarchical view of the BYMAV content catalog (areas → disciplines).
        Each discipline includes counts of N3 themes, N4 contents, active questions
        (with N3/N4 link percentages), flashcards, and simulado references, plus a
        `curado` boolean and explicit `gaps[]` list. Backed by materialized view
        `vita.catalog_status`. SOT for the question/flashcard/simulado pipeline.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Catalog status grouped by area
          content:
            application/json:
              schema:
                type: object
                properties:
                  generatedAt:
                    type: string
                    format: date-time
                  totals:
                    type: object
                    properties:
                      areas: { type: integer }
                      disciplines: { type: integer }
                      curadas: { type: integer }
                      topicsN3: { type: integer }
                      contentsN4: { type: integer }
                      questionsActive: { type: integer }
                      questionsWithN3: { type: integer }
                      questionsWithN4: { type: integer }
                      flashcardsTotal: { type: integer }
                      flashcardsWithTopic: { type: integer }
                      simuladosRef: { type: integer }
                  areas:
                    type: array
                    items:
                      type: object
                      properties:
                        area: { type: string }
                        discs: { type: integer }
                        curadas: { type: integer }
                        disciplines:
                          type: array
                          items:
                            $ref: '#/components/schemas/CatalogStatusDiscipline'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/admin/catalog-status/refresh:
    post:
      tags: [admin]
      operationId: refreshAdminCatalogStatus
      summary: Refresh catalog_status materialized view (admin only)
      description: |
        Triggers `REFRESH MATERIALIZED VIEW CONCURRENTLY vita.catalog_status`.
        Returns refreshed timestamp and total rows. Used after applying
        taxonomy/flashcard/simulado migrations.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: View refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  refreshedAt: { type: string, format: date-time }
                  rows: { type: integer }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/admin/portal-discovery:
    get:
      tags: [admin]
      operationId: getAdminPortalDiscovery
      summary: List portal URL discovery runs (admin only)
      description: |
        Returns summary of catalog URL coverage and the most recent pending
        discovery candidates awaiting human approval. Backed by staging table
        `vita.portal_discovery_runs`. Does NOT expose production portal URLs
        directly; only candidate rows produced by Haiku.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Discovery summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    type: object
                    properties:
                      totalUniversities: { type: integer }
                      withPortalUrl: { type: integer }
                      missingPortalUrl: { type: integer }
                      pendingRuns: { type: integer }
                  pending:
                    type: array
                    items:
                      $ref: '#/components/schemas/PortalDiscoveryRun'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [admin]
      operationId: runAdminPortalDiscovery
      summary: Trigger Haiku portal URL discovery for universities (admin only)
      description: |
        Asks Haiku (via Hub, OAuth Max — not Anthropic API) to suggest portal
        URLs for one university (`universityId`) or a batch (`scope: 'missing'`
        or `'all'`). Results land in `vita.portal_discovery_runs` as pending
        candidates. Batch capped at 50 universities per call. Never writes
        to `university_portals` directly.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                universityId: { type: string, format: uuid, nullable: true }
                scope:
                  type: string
                  enum: [missing, all]
                  nullable: true
      responses:
        '200':
          description: Discovery started, candidates staged
          content:
            application/json:
              schema:
                type: object
                properties:
                  processed: { type: integer }
                  candidatesCreated: { type: integer }
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        universityId: { type: string }
                        error: { type: string }
        '400':
          description: Bad request (missing universityId or invalid scope)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/portal-discovery/approve:
    post:
      tags: [admin]
      operationId: approveAdminPortalDiscovery
      summary: Approve or reject discovery candidates (admin only)
      description: |
        Marks rows in `vita.portal_discovery_runs` as approved/rejected by run id.
        Approved candidates are upserted into `vita.university_portals` (dedup
        by portalType + instanceUrl). Rejected rows stay in staging for audit.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                approve:
                  type: array
                  items: { type: string, format: uuid }
                reject:
                  type: array
                  items: { type: string, format: uuid }
      responses:
        '200':
          description: Rows processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  approved: { type: integer }
                  rejected: { type: integer }
                  upserted: { type: integer }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'


# dashboard flashcardsDueTotal fix 2026-04-20

          $ref: '#/components/responses/NotFound'

  /api/study/flashcards/import-anki:
    post:
      tags: [flashcards]
      operationId: importAnkiDeck
      summary: Importa um baralho .apkg do Anki (Criar com o Vita)
      description: |
        multipart/form-data com campo "file" (.apkg até 200 MB). Suporta o
        formato legado (collection.anki2/anki21, SQLite schema v11 — export com
        "Support older Anki versions"); o formato anki21b é rejeitado com 400 e
        mensagem pedindo re-export. Cada deck do .apkg vira baralho novo; cards
        nascem NEW no FSRS; mídia <img> sobe pro R2 e é servida pela rota
        anki-media (capability URL por importId).
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required: [file]
      responses:
        '202':
          description: |
            Job criado. O import roda em SEGUNDO PLANO — o app não espera. O
            progresso chega por SSE (domínio `jobs`); o resultado fica em
            `result` quando `status` vira `done`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackgroundJob'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/study/flashcards/anki-media/{importId}/{file}:
    get:
      tags: [flashcards]
      operationId: getAnkiMedia
      summary: Serve mídia de import Anki (capability URL, sem sessão)
      description: |
        Imagem de card importado do Anki, direto do R2. Sem auth de propósito —
        o renderer do card usa AsyncImage (sem cookie); o importId UUID
        aleatório é a capability. Cache imutável.
      parameters:
        - name: importId
          in: path
          required: true
          schema:
            type: string
        - name: file
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Bytes da imagem
          content:
            image/*:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'

  /api/study/flashcards/library/{slug}/pack:
    get:
      tags: [flashcards]
      operationId: getLibraryDeckPack
      summary: Baralho da Biblioteca como .apkg (download por baralho / offline)
      description: |
        Devolve o baralho inteiro da disciplina como `.apkg` real (schema v11):
        cards + mídia embutida, guid da nota = id do nosso card (o iOS casa o
        FSRS local por ele). Cacheado no R2 por versão do conteúdo. Headers
        X-Pack-Version / X-Card-Count / X-Media-Count pro manifest do device.
        Spec: flashcards-offline-download-por-baralho.md.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Bytes do .apkg
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':

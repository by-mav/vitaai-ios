                type: boolean
        images:
          type: array
          items:
            type: object
        topics:
          type: array
          items:
            type: object
        statistics:
          type: object
          nullable: true
        userAnswer:
          type: object
          nullable: true
        medevoSlug:
          description: 'Slug original MedEvo (cross-match Vita x MedEvo). Rastreia origem cursinho. Added 2026-04-27.'
          type: string
          nullable: true
        medevoArea:
          description: 'Area cursinho-style MedEvo (7 valores). Tag PARALELA a arvore canonica BYMAV. Mapeada para examArea INEP via vita.exam_area_mapping. Added 2026-04-27.'
          type: string
          nullable: true
          enum: ["Clinica Medica", "Cirurgia", "Pediatria", "Ginecologia", "Obstetricia", "Medicina Preventiva e Social", "Oftalmologia", "Saude Mental"]
        medevoTopic:
          description: 'Topic granular MedEvo (~169 valores). Tag PARALELA. Added 2026-04-27.'
          type: string
          nullable: true
        medevoSubtopic:
          description: 'Subtopic ultra-granular MedEvo (~799 valores). Tag PARALELA. Added 2026-04-27.'
          type: string
          nullable: true
        examGreatAreaSlug:
          description: >-
            Nível 1 da árvore canônica (vita-shell §1.1): uma das grandes áreas de
            `vita.exam_great_areas`. Derivada da disciplina — nunca julgada
            isoladamente. Sem enum fixo aqui: a fonte é a tabela.
          type: string
          nullable: true
        isSynthetic:
          description: 'true se Q gerada (sem institutionId + year>=2025 + source=medsimple). false se prova real. Filtrar isSynthetic=false para Jornada-com-objetivo. Added 2026-04-27.'
          type: boolean
          default: false
        matchConfidence:
          description: 'Confianca cross-match MedEvo. 1.0=exato fingerprint SHA1 normalizado, 0.85-0.99=fuzzy MinHash+LSH, null=sem match. Added 2026-04-27.'
          type: number
          format: float
          nullable: true

    QBankProgress:
      type: object
      properties:
        totalAvailable:
          type: integer
        totalAnswered:
          type: integer
        totalCorrect:
          type: integer
        totalAnswers:
          type: integer
        accuracy:
          type: number
        avgResponseSeconds:
          type: integer
          nullable: true
          description: >
            Segundos médios por questão respondida. O tempo de cada resposta já
            era gravado em qbank_user_answers.responseTimeMs e não aparecia em
            lugar nenhum do app — pra quem treina pra prova cronometrada, ritmo
            pesa tanto quanto acerto. Descarta leituras fora de 1s..30min (o
            aluno que sai pro café com o app aberto não pode contaminar a
            média). Null enquanto não houver resposta medida. Added 2026-07-20.
        byDifficulty:
          type: array
          items:
            type: object
        byTopic:
          type: array
          items:
            type: object
        byArea:
          description: >
            Desempenho pelas GRANDES ÁREAS DE PROVA (exam_great_areas, CNRM/ENARE:
            Ciclo Básico, Clínica Médica, Cirurgia Geral, GO, Pediatria, Medicina
            Preventiva) → disciplinas canônicas (via qbank_topics.disciplineSlug →
            disciplines.examGreatAreaSlug). Cada área traz accuracy média + as
            disciplinas, ordenadas mais fracas primeiro. Added 2026-07-16.
          type: array
          items:
            type: object
            required: [area, areaName, answered, accuracy, disciplines]
            properties:
              area:
                type: string
                description: Slug da grande área de prova (exam_great_areas, CNRM/ENARE)
              areaName:
                type: string
                description: Nome da grande área (ex "Clínica Médica")
              answered:
                type: integer
              accuracy:
                type: integer
                description: 0-100, média da área
              disciplines:
                type: array
                items:
                  type: object
                  required: [slug, name, answered, accuracy]
                  properties:
                    slug:
                      type: string
                    name:
                      type: string
                    answered:
                      type: integer
                    accuracy:
                      type: integer
        scope:
          description: >
            "global" when totals reflect the whole catalogue (stage-scoped), "enrolled" when
            the `disciplineSlugs[]` query param was supplied. Added 2026-04-17.
          type: string
          enum: [global, enrolled]
          nullable: true
        scopedSlugs:
          description: >
            Echo of the `disciplineSlugs[]` query param used to filter this response. Empty
            array when `scope = "global"`. Added 2026-04-17.
          type: array
          items:
            type: string
          nullable: true
        requestedSlugs:
          description: >
            Echo of the original `disciplineSlugs[]` query param BEFORE server-side
            resolution. Differs from `scopedSlugs` when enrolled slugs are resolved to
            canonical qbank slugs (e.g. anatomia-medica-i -> anatomia). Added 2026-04-17c.
          type: array
          items:
            type: string
          nullable: true


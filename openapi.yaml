          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
          nullable: true
        disciplineTitle:
          description: >
            Discipline label to display in the "Sessões Recentes" cell. Either the user's filter
            when the session was created, or the first topic's discipline slug. Added 2026-04-17.
          type: string
          nullable: true
        topicTitle:
          description: >
            Topic label to display in the "Sessões Recentes" cell. Either the first filter topic's
            title, or the first question's first topic title. Added 2026-04-17.
          type: string
          nullable: true
        disciplineTitles:
          description: >
            Full list of discipline labels the session was scoped to (derived from
            `filters.disciplineSlugs` at creation time). The session `title` is a compact
            "First +N" summary for display; this field is the source of truth when the client
            needs every discipline. Added 2026-04-17b.
          type: array
          items:
            type: string
          nullable: true
        questionIds:
          description: >
            Ordered list of question IDs for this session. Returned only by POST /api/qbank/sessions
            (session creation). Not persisted or returned by GET — clients must cache locally
            after creation. Added 2026-04-19 to support Android QBank session navigation.

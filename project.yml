# IMPORTANTE: Este projeto usa AMBOS xcodegen E CocoaPods.
# NAO rode xcodegen generate direto — use ./scripts/regenerate-project.sh
# que faz xcodegen generate + pod install em sequencia.
# CocoaPods eh necessario porque Google ML Kit Digital Ink Recognition NAO
# tem SPM oficial (apenas CocoaPods). Build via VitaAI.xcworkspace (NAO .xcodeproj).
# Ref: agent-brain/incidents/vitaai/2026-04-29_xcodegen-cocoapods-coexistence.md

name: VitaAI

options:
  bundleIdPrefix: com.bymav
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

packages:
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.40.0"
  GLTFKit2:
    url: https://github.com/warrenm/GLTFKit2
    from: "0.5.0"
  # Unzip do pack .apkg (download por baralho offline) — puro Swift, Apache-2.0.
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: "0.9.19"
  # Leitor de HTML do card do Anki (o card É uma página web). Puro Swift, MIT.
  # Substitui a extração por regex, que dependia de alguém LEMBRAR de cada tag:
  # 13 das 25 tags do baralho não eram tratadas e o texto saía grudado.
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup
    from: "2.7.0"


settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_BITCODE: NO
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  VitaAI:
    type: application
    platform: iOS
    sources:
      - path: VitaAI
        excludes:
          - "**/*.md"
          # Conteudo NAO vai embarcado na apk (Rafael 2026-07-19): flashcards e
          # midia sao BAIXADOS por baralho (spec flashcards-offline-download-por-
          # baralho.md). Antes eram 71 MB que todo aluno baixava na App Store
          # mesmo sem abrir flashcards.
          - "Resources/FlashcardMedia"
          - "Resources/vita-flashcards-library.json"
    info:
      path: VitaAI/Info.plist
      properties:
        # Apple export-compliance gate G1 in deploy-testflight.sh — explicit
        # NO so TestFlight doesn't hold the build awaiting manual review.
        # We don't use proprietary crypto, only standard HTTPS/TLS.
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSCameraUsageDescription: "VitaAI usa a câmera para fotografar suas anotações e transformá-las em flashcards."
        NSMicrophoneUsageDescription: "VitaAI precisa do microfone para gravar suas aulas e gerar transcrições automáticas."
        NSSpeechRecognitionUsageDescription: "VitaAI usa reconhecimento de fala para transcrever suas aulas em tempo real."
        # Pasta do app visível no Arquivos (import .apkg do Anki: o aluno acha
        # o arquivo baixado em "No meu iPhone → VitaAI"; também usado no QA).
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UIBackgroundModes:
          - fetch
          - processing
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - com.bymav.vitaai.refresh
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLName: com.bymav.vitaai
            CFBundleURLSchemes:
              - vitaai
    dependencies:
      - package: Sentry
        product: Sentry
      - package: Sentry
        product: SentrySwiftUI
      - package: GLTFKit2
        product: GLTFKit2
      - package: ZIPFoundation
        product: ZIPFoundation
      - package: SwiftSoup
        product: SwiftSoup
    settings:
      base:
        PRODUCT_NAME: VitaAI
        PRODUCT_BUNDLE_IDENTIFIER: com.bymav.vitaai
        DEVELOPMENT_TEAM: PJ8972D48J
        INFOPLIST_FILE: VitaAI/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        CODE_SIGN_ENTITLEMENTS: VitaAI/VitaAI.entitlements
        # Simulador: build nao-assinado nao ganha application-identifier ->
        # Keychain falha (-34018) -> token de sessao NUNCA persiste -> pede
        # login a cada relaunch (bug cronico, Rafael 2026-07-01). O entitlements
        # de sim declara keychain-access-groups explicito e resolve.
        "CODE_SIGN_ENTITLEMENTS[sdk=iphonesimulator*]": VitaAI/VitaAI-Simulator.entitlements
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          CODE_SIGN_STYLE: Automatic
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          VALIDATE_PRODUCT: YES
    scheme:
      testTargets:
        - VitaAIUITests
  VitaAIUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: VitaAIUITests
    dependencies:
      - target: VitaAI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bymav.vitaai.uitests
        DEVELOPMENT_TEAM: PJ8972D48J
        TEST_TARGET_NAME: VitaAI
        GENERATE_INFOPLIST_FILE: YES
